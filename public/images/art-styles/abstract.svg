<svg xmlns="http://www.w3.org/2000/svg" width="200" height="130" viewBox="0 0 200 130">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00b0ff"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffea00"/>
      <stop offset="100%" stop-color="#ff6d00"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="130" fill="url(#bg)"/>
  <!-- Abstract geometric shapes -->
  <!-- Large triangle -->
  <polygon points="100,10 165,110 35,110" fill="url(#g1)" opacity="0.6"/>
  <!-- Circle -->
  <circle cx="100" cy="65" r="35" fill="url(#g2)" opacity="0.5"/>
  <!-- Diamond -->
  <polygon points="100,30 130,65 100,100 70,65" fill="url(#g3)" opacity="0.55"/>
  <!-- Small accent shapes -->
  <circle cx="30" cy="30" r="12" fill="#e040fb" opacity="0.7"/>
  <circle cx="170" cy="30" r="8" fill="#00e5ff" opacity="0.7"/>
  <rect x="155" y="85" width="20" height="20" rx="3" fill="#ffea00" opacity="0.6" transform="rotate(25,165,95)"/>
  <rect x="18" y="80" width="16" height="16" rx="3" fill="#e040fb" opacity="0.6" transform="rotate(-15,26,88)"/>
  <!-- Lines / rays -->
  <line x1="100" y1="65" x2="20" y2="15" stroke="#e040fb" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="65" x2="185" y2="20" stroke="#00e5ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="65" x2="190" y2="115" stroke="#ffea00" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="65" x2="10" y2="115" stroke="#7c4dff" stroke-width="1.5" opacity="0.4"/>
  <!-- Center glow dot -->
  <circle cx="100" cy="65" r="8" fill="white" opacity="0.9"/>
  <circle cx="100" cy="65" r="4" fill="#ffea00"/>
</svg>
