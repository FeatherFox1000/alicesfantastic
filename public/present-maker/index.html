<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Present Maker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #fce4ec; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 12px;
      gap: 10px;
    }

    h1 {
      text-align: center;
      font-size: 1.3rem;
      color: #ad1457;
      margin: 0;
    }

    .main {
      display: flex;
      flex: 1;
      gap: 12px;
      min-height: 0;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 180px;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .control-group {
      background: white;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .control-group h3 {
      font-size: 0.75rem;
      color: #ad1457;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .color-row label {
      font-size: 0.75rem;
      color: #555;
      min-width: 50px;
    }

    input[type="color"] {
      width: 36px;
      height: 28px;
      border: 2px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      padding: 1px;
    }

    .pattern-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .pattern-btn {
      padding: 6px 4px;
      border: 2px solid #eee;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 0.65rem;
      color: #555;
      transition: all 0.15s;
    }

    .pattern-btn:hover {
      border-color: #f48fb1;
      background: #fce4ec;
    }

    .pattern-btn.active {
      border-color: #ad1457;
      background: #fce4ec;
      color: #ad1457;
      font-weight: bold;
    }

    .bow-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
    }

    .bow-btn {
      padding: 6px 2px;
      border: 2px solid #eee;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.15s;
      text-align: center;
    }

    .bow-btn:hover {
      border-color: #f48fb1;
      background: #fce4ec;
    }

    .bow-btn.active {
      border-color: #ad1457;
      background: #fce4ec;
    }

    .preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }

    canvas {
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      max-width: 100%;
      max-height: 100%;
    }

    .save-btn {
      display: block;
      margin: 0 auto;
      padding: 8px 24px;
      background: linear-gradient(135deg, #ad1457, #e91e63);
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(173,20,87,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .save-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(173,20,87,0.4);
    }

    @media (max-width: 500px) {
      .main { flex-direction: column; }
      .controls { width: 100%; flex-direction: row; flex-wrap: wrap; overflow-y: visible; }
      .control-group { flex: 1; min-width: 140px; }
    }
  </style>
</head>
<body>
<div class="app">
  <h1>🎁 Present Maker</h1>

  <div class="main">
    <div class="controls">
      <div class="control-group">
        <h3>Paper Color</h3>
        <div class="color-row">
          <label>Base</label>
          <input type="color" id="baseColor" value="#e53935">
        </div>
        <div class="color-row">
          <label>Pattern</label>
          <input type="color" id="patternColor" value="#ffcdd2">
        </div>
      </div>

      <div class="control-group">
        <h3>Pattern</h3>
        <div class="pattern-grid">
          <button class="pattern-btn active" data-pattern="none">None</button>
          <button class="pattern-btn" data-pattern="polkaDots">Dots</button>
          <button class="pattern-btn" data-pattern="stripes">Stripes</button>
          <button class="pattern-btn" data-pattern="stars">Stars</button>
          <button class="pattern-btn" data-pattern="hearts">Hearts</button>
          <button class="pattern-btn" data-pattern="zigzag">Zigzag</button>
          <button class="pattern-btn" data-pattern="diamonds">Diamonds</button>
          <button class="pattern-btn" data-pattern="plaid">Plaid</button>
        </div>
      </div>

      <div class="control-group">
        <h3>Bow</h3>
        <div class="color-row">
          <label>Color</label>
          <input type="color" id="bowColor" value="#fdd835">
        </div>
        <div class="bow-grid">
          <button class="bow-btn active" data-bow="classic">🎀</button>
          <button class="bow-btn" data-bow="big">🎗️</button>
          <button class="bow-btn" data-bow="none">❌</button>
        </div>
      </div>
    </div>

    <div class="preview-area">
      <canvas id="present" width="400" height="400"></canvas>
    </div>
  </div>

  <button class="save-btn" id="saveBtn">💾 Save My Present!</button>
</div>

<script>
const canvas = document.getElementById('present');
const ctx = canvas.getContext('2d');

let baseColor = '#e53935';
let patternColor = '#ffcdd2';
let bowColor = '#fdd835';
let pattern = 'none';
let bowStyle = 'classic';

// Controls
document.getElementById('baseColor').addEventListener('input', e => { baseColor = e.target.value; draw(); });
document.getElementById('patternColor').addEventListener('input', e => { patternColor = e.target.value; draw(); });
document.getElementById('bowColor').addEventListener('input', e => { bowColor = e.target.value; draw(); });

document.querySelectorAll('.pattern-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    pattern = btn.dataset.pattern;
    draw();
  });
});

document.querySelectorAll('.bow-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bow-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    bowStyle = btn.dataset.bow;
    draw();
  });
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'my-present.png';
  link.href = canvas.toDataURL();
  link.click();
});

// Drawing functions
function drawWrappingPaper(x, y, w, h) {
  ctx.fillStyle = baseColor;
  ctx.fillRect(x, y, w, h);

  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();

  ctx.fillStyle = patternColor;
  ctx.strokeStyle = patternColor;

  if (pattern === 'polkaDots') {
    const spacing = 28;
    for (let row = 0; row < h / spacing + 1; row++) {
      for (let col = 0; col < w / spacing + 1; col++) {
        const offsetX = row % 2 === 0 ? 0 : spacing / 2;
        const cx = x + col * spacing + offsetX + spacing / 2;
        const cy = y + row * spacing + spacing / 2;
        ctx.beginPath();
        ctx.arc(cx, cy, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  } else if (pattern === 'stripes') {
    ctx.lineWidth = 6;
    for (let i = -h; i < w + h; i += 20) {
      ctx.beginPath();
      ctx.moveTo(x + i, y);
      ctx.lineTo(x + i - h, y + h);
      ctx.stroke();
    }
  } else if (pattern === 'stars') {
    const spacing = 36;
    for (let row = 0; row < h / spacing + 1; row++) {
      for (let col = 0; col < w / spacing + 1; col++) {
        const offsetX = row % 2 === 0 ? 0 : spacing / 2;
        const cx = x + col * spacing + offsetX + spacing / 2;
        const cy = y + row * spacing + spacing / 2;
        drawStar(cx, cy, 7, 5);
      }
    }
  } else if (pattern === 'hearts') {
    const spacing = 32;
    for (let row = 0; row < h / spacing + 1; row++) {
      for (let col = 0; col < w / spacing + 1; col++) {
        const offsetX = row % 2 === 0 ? 0 : spacing / 2;
        const cx = x + col * spacing + offsetX + spacing / 2;
        const cy = y + row * spacing + spacing / 2;
        drawHeart(cx, cy, 8);
      }
    }
  } else if (pattern === 'zigzag') {
    ctx.lineWidth = 3;
    const zigH = 16;
    const zigW = 14;
    for (let row = 0; row < h / zigH + 1; row++) {
      ctx.beginPath();
      for (let col = 0; col <= w / zigW + 1; col++) {
        const px = x + col * zigW;
        const py = y + row * zigH * 2 + (col % 2 === 0 ? 0 : zigH);
        if (col === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
  } else if (pattern === 'diamonds') {
    const spacing = 30;
    for (let row = 0; row < h / spacing + 1; row++) {
      for (let col = 0; col < w / spacing + 1; col++) {
        const offsetX = row % 2 === 0 ? 0 : spacing / 2;
        const cx = x + col * spacing + offsetX + spacing / 2;
        const cy = y + row * spacing + spacing / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy - 8);
        ctx.lineTo(cx + 6, cy);
        ctx.lineTo(cx, cy + 8);
        ctx.lineTo(cx - 6, cy);
        ctx.closePath();
        ctx.fill();
      }
    }
  } else if (pattern === 'plaid') {
    ctx.globalAlpha = 0.3;
    ctx.lineWidth = 8;
    for (let i = 0; i < w; i += 24) {
      ctx.beginPath();
      ctx.moveTo(x + i, y);
      ctx.lineTo(x + i, y + h);
      ctx.stroke();
    }
    for (let i = 0; i < h; i += 24) {
      ctx.beginPath();
      ctx.moveTo(x, y + i);
      ctx.lineTo(x + w, y + i);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawStar(cx, cy, r, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const radius = i % 2 === 0 ? r : r * 0.45;
    const angle = (i * Math.PI) / points - Math.PI / 2;
    const px = cx + Math.cos(angle) * radius;
    const py = cy + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
}

function drawHeart(cx, cy, size) {
  ctx.beginPath();
  ctx.moveTo(cx, cy + size * 0.4);
  ctx.bezierCurveTo(cx - size, cy - size * 0.5, cx - size * 0.5, cy - size, cx, cy - size * 0.4);
  ctx.bezierCurveTo(cx + size * 0.5, cy - size, cx + size, cy - size * 0.5, cx, cy + size * 0.4);
  ctx.fill();
}

function darken(hex, amount) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.max(0, r - amount);
  g = Math.max(0, g - amount);
  b = Math.max(0, b - amount);
  return `rgb(${r},${g},${b})`;
}

function lighten(hex, amount) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.min(255, r + amount);
  g = Math.min(255, g + amount);
  b = Math.min(255, b + amount);
  return `rgb(${r},${g},${b})`;
}

function drawRibbonOnBox(boxX, boxY, boxW, boxH, lidX, lidY, lidW, lidH, sideW, ribbonW) {
  if (bowStyle === 'none') return;

  const halfR = ribbonW / 2;
  const frontCenterX = boxX + boxW / 2;
  // The perspective skew ratio: 25px rise over sideW run
  const skew = 25 / sideW;

  // --- FRONT FACE ---
  // Vertical ribbon down center of front (lid + box)
  ctx.fillStyle = bowColor;
  ctx.fillRect(frontCenterX - halfR, lidY, ribbonW, lidH + boxH);
  ctx.fillStyle = darken(bowColor, 30);
  ctx.fillRect(frontCenterX - halfR, lidY, 2, lidH + boxH);

  // Horizontal ribbon across lid front
  const ribbonFrontY = lidY + lidH / 2 - halfR;
  ctx.fillStyle = bowColor;
  ctx.fillRect(lidX, ribbonFrontY, lidW, ribbonW);
  ctx.fillStyle = darken(bowColor, 30);
  ctx.fillRect(lidX, ribbonFrontY, lidW, 2);

  // --- TOP FACE (only ribbon strips, not whole face) ---
  ctx.save();
  // Clip to top face
  ctx.beginPath();
  ctx.moveTo(lidX, lidY);
  ctx.lineTo(lidX + sideW, lidY - 25);
  ctx.lineTo(lidX + lidW + sideW, lidY - 25);
  ctx.lineTo(lidX + lidW, lidY);
  ctx.closePath();
  ctx.clip();

  // Vertical ribbon strip going back across top
  ctx.fillStyle = darken(bowColor, 10);
  ctx.beginPath();
  ctx.moveTo(frontCenterX - halfR, lidY);
  ctx.lineTo(frontCenterX - halfR + sideW, lidY - 25);
  ctx.lineTo(frontCenterX + halfR + sideW, lidY - 25);
  ctx.lineTo(frontCenterX + halfR, lidY);
  ctx.closePath();
  ctx.fill();

  // Horizontal ribbon strip going across top (at the midpoint depth)
  // This connects the front horizontal ribbon to the back
  const topHorizMidFrontY = lidY - 25 / 2;
  ctx.fillStyle = darken(bowColor, 15);
  ctx.beginPath();
  ctx.moveTo(lidX, ribbonFrontY);
  ctx.lineTo(lidX + sideW, ribbonFrontY - 25);
  ctx.lineTo(lidX + sideW, ribbonFrontY - 25 + ribbonW);
  ctx.lineTo(lidX, ribbonFrontY + ribbonW);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(lidX + lidW, ribbonFrontY);
  ctx.lineTo(lidX + lidW + sideW, ribbonFrontY - 25);
  ctx.lineTo(lidX + lidW + sideW, ribbonFrontY - 25 + ribbonW);
  ctx.lineTo(lidX + lidW, ribbonFrontY + ribbonW);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // --- RIGHT SIDE of lid (just horizontal ribbon strip) ---
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(lidX + lidW, lidY);
  ctx.lineTo(lidX + lidW + sideW, lidY - 25);
  ctx.lineTo(lidX + lidW + sideW, lidY - 25 + lidH);
  ctx.lineTo(lidX + lidW, lidY + lidH);
  ctx.closePath();
  ctx.clip();
  ctx.fillStyle = darken(bowColor, 35);
  // The horizontal ribbon continues onto the side
  ctx.beginPath();
  ctx.moveTo(lidX + lidW, ribbonFrontY);
  ctx.lineTo(lidX + lidW + sideW, ribbonFrontY - 25);
  ctx.lineTo(lidX + lidW + sideW, ribbonFrontY - 25 + ribbonW);
  ctx.lineTo(lidX + lidW, ribbonFrontY + ribbonW);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawBowKnot(cx, cy) {
  if (bowStyle === 'none') return;

  const loopSize = bowStyle === 'big' ? 1.4 : 1;
  const s = loopSize;

  // Bow loops
  ctx.fillStyle = bowColor;
  // Left loop
  ctx.beginPath();
  ctx.ellipse(cx - 18*s, cy, 18*s, 11*s, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // Right loop
  ctx.beginPath();
  ctx.ellipse(cx + 18*s, cy, 18*s, 11*s, 0.3, 0, Math.PI * 2);
  ctx.fill();

  if (bowStyle === 'big') {
    // Extra top loops for big bow
    ctx.beginPath();
    ctx.ellipse(cx - 10*s, cy - 16*s, 14*s, 10*s, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 10*s, cy - 16*s, 14*s, 10*s, 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Highlights on loops
  ctx.fillStyle = lighten(bowColor, 40);
  ctx.beginPath();
  ctx.ellipse(cx - 20*s, cy - 3*s, 10*s, 5*s, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + 16*s, cy - 3*s, 10*s, 5*s, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Tails
  ctx.fillStyle = bowColor;
  ctx.beginPath();
  ctx.moveTo(cx - 5, cy + 4*s);
  ctx.lineTo(cx - 16*s, cy + 24*s);
  ctx.lineTo(cx - 9*s, cy + 18*s);
  ctx.lineTo(cx - 2, cy + 6*s);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx + 5, cy + 4*s);
  ctx.lineTo(cx + 16*s, cy + 24*s);
  ctx.lineTo(cx + 9*s, cy + 18*s);
  ctx.lineTo(cx + 2, cy + 6*s);
  ctx.fill();

  // Center knot
  ctx.fillStyle = darken(bowColor, 20);
  ctx.beginPath();
  ctx.ellipse(cx, cy, 7*s, 7*s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = bowColor;
  ctx.beginPath();
  ctx.ellipse(cx, cy - 1, 5*s, 5*s, 0, 0, Math.PI * 2);
  ctx.fill();
}

function draw() {
  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background - subtle gradient
  const grad = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, 280);
  grad.addColorStop(0, '#fff8f0');
  grad.addColorStop(1, '#ffe0e6');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Shadow under present
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.ellipse(W/2, 330, 100, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Present box dimensions
  const boxW = 160;
  const boxH = 130;
  const boxX = W/2 - boxW/2;
  const boxY = 180;

  // Lid dimensions
  const lidW = 174;
  const lidH = 26;
  const lidX = W/2 - lidW/2;
  const lidY = boxY - lidH;

  const sideW = 40;

  // Front face
  drawWrappingPaper(boxX, boxY, boxW, boxH);

  // Darker right side (3D effect)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(boxX + boxW, boxY);
  ctx.lineTo(boxX + boxW + sideW, boxY - 25);
  ctx.lineTo(boxX + boxW + sideW, boxY - 25 + boxH);
  ctx.lineTo(boxX + boxW, boxY + boxH);
  ctx.closePath();
  ctx.clip();
  ctx.fillStyle = darken(baseColor, 40);
  ctx.fill();
  if (pattern !== 'none') {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = patternColor;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  // Top face
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(lidX, lidY);
  ctx.lineTo(lidX + sideW, lidY - 25);
  ctx.lineTo(lidX + lidW + sideW, lidY - 25);
  ctx.lineTo(lidX + lidW, lidY);
  ctx.closePath();
  ctx.clip();
  ctx.fillStyle = darken(baseColor, 20);
  ctx.fill();
  ctx.restore();

  // Lid front face
  drawWrappingPaper(lidX, lidY, lidW, lidH);

  // Lid right side
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(lidX + lidW, lidY);
  ctx.lineTo(lidX + lidW + sideW, lidY - 25);
  ctx.lineTo(lidX + lidW + sideW, lidY - 25 + lidH);
  ctx.lineTo(lidX + lidW, lidY + lidH);
  ctx.closePath();
  ctx.fillStyle = darken(baseColor, 55);
  ctx.fill();
  ctx.restore();

  // Draw ribbon on the box surfaces
  const ribbonW = bowStyle === 'big' ? 14 : 10;
  drawRibbonOnBox(boxX, boxY, boxW, boxH, lidX, lidY, lidW, lidH, sideW, ribbonW);

  // Edge lines for definition
  ctx.strokeStyle = darken(baseColor, 60);
  ctx.lineWidth = 1.5;
  ctx.strokeRect(boxX, boxY, boxW, boxH);
  ctx.strokeRect(lidX, lidY, lidW, lidH);
  // Right side edges
  ctx.beginPath();
  ctx.moveTo(boxX + boxW, boxY);
  ctx.lineTo(boxX + boxW + sideW, boxY - 25);
  ctx.lineTo(boxX + boxW + sideW, boxY + boxH - 25);
  ctx.lineTo(boxX + boxW, boxY + boxH);
  ctx.stroke();
  // Top edges
  ctx.beginPath();
  ctx.moveTo(lidX, lidY);
  ctx.lineTo(lidX + sideW, lidY - 25);
  ctx.lineTo(lidX + lidW + sideW, lidY - 25);
  ctx.lineTo(lidX + lidW, lidY);
  ctx.stroke();
  // Lid right side edges
  ctx.beginPath();
  ctx.moveTo(lidX + lidW, lidY);
  ctx.lineTo(lidX + lidW + sideW, lidY - 25);
  ctx.lineTo(lidX + lidW + sideW, lidY - 25 + lidH);
  ctx.lineTo(lidX + lidW, lidY + lidH);
  ctx.stroke();

  // Draw bow knot at the ribbon crossing on the front face
  const bowCenterX = boxX + boxW / 2;
  const bowCenterY = lidY + lidH / 2;
  drawBowKnot(bowCenterX, bowCenterY);
}

draw();
</script>
</body>
</html>
