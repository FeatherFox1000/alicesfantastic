<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homey</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #f5f0ff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

.top-bar {
  background: linear-gradient(135deg, #7b14c9, #9d4edd);
  color: white; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; flex-wrap: wrap;
}
.top-bar h1 { font-size: 1.2rem; }
.room-tabs { display: flex; gap: 0.3rem; margin-left: auto; }
.room-tab { background: rgba(255,255,255,0.2); border: none; color: white; padding: 0.35rem 0.7rem; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: background 0.2s; }
.room-tab:hover { background: rgba(255,255,255,0.35); }
.room-tab.active { background: white; color: #7b14c9; }
.top-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 0.3rem 0.6rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
.top-btn:hover { background: rgba(255,255,255,0.3); }
.color-label { color: white; font-size: 0.75rem; font-weight: 600; }
.pat-color { width: 26px; height: 24px; border: 2px solid rgba(255,255,255,0.5); border-radius: 4px; cursor: pointer; padding: 0; background: none; }

.main { display: flex; flex: 1; overflow: hidden; }

.palette { width: 180px; background: white; border-right: 2px solid #e0d4f5; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.palette-search { margin: 0.5rem 0.5rem 0; padding: 0.35rem 0.5rem; border: 2px solid #e0d4f5; border-radius: 6px; font-size: 0.8rem; outline: none; }
.palette-search:focus { border-color: #7b14c9; }
.palette-cat { font-size: 0.7rem; font-weight: 700; color: #7b14c9; text-transform: uppercase; letter-spacing: 0.5px; padding: 0.5rem 0.6rem 0.2rem; }
.palette-items { display: flex; flex-wrap: wrap; gap: 0.3rem; padding: 0.3rem 0.5rem; }
.palette-item { width: 52px; height: 58px; background: #f9f5ff; border: 2px solid #e0d4f5; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: grab; transition: all 0.15s; user-select: none; }
.palette-item:hover { border-color: #7b14c9; background: #f0e6ff; }
.palette-item canvas { pointer-events: none; }
.palette-item .label { font-size: 0.5rem; color: #666; margin-top: 1px; font-weight: 600; text-align: center; max-width: 48px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.room-container { flex: 1; position: relative; overflow: hidden; }
.room { width: 100%; height: 100%; position: relative; }
.room-wall { position: absolute; left:0; right:0; top:0; height:40%; }
.room-floor { position: absolute; left:0; right:0; top:40%; bottom:0; }
.room-line { position: absolute; left:0; right:0; top:40%; height:3px; background: rgba(0,0,0,0.15); z-index:1; }
.pattern-bar { display: flex; align-items: center; gap: 0.3rem; }
.pat-btn { width: 26px; height: 26px; border: 2px solid rgba(255,255,255,0.3); border-radius: 4px; cursor: pointer; padding: 0; background: #666; overflow: hidden; }
.pat-btn.active { border-color: white; box-shadow: 0 0 4px rgba(255,255,255,0.6); }
.pat-btn canvas { width: 100%; height: 100%; display: block; pointer-events: none; }

.furniture { position: absolute; cursor: grab; user-select: none; z-index: 2; }
.furniture:hover { filter: brightness(1.08); }
.furniture.dragging { opacity: 0.7; z-index: 100; cursor: grabbing; }
.furniture .btn-row { display: none; position: absolute; top: -10px; right: -4px; gap: 2px; z-index: 10; }
.furniture:hover .btn-row { display: flex; }
.furniture .fb { background: #e53e3e; color: white; border: none; width: 18px; height: 18px; border-radius: 50%; font-size: 0.55rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.furniture .fb.color-btn { background: #7b14c9; position: relative; overflow: hidden; }
.furniture .fb.color-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.furniture .resize-handle { display: none; position: absolute; bottom: -3px; right: -3px; width: 14px; height: 14px; cursor: nwse-resize; z-index: 11; }
.furniture .resize-handle::after { content: ''; position: absolute; bottom: 2px; right: 2px; width: 0; height: 0; border-style: solid; border-width: 0 0 10px 10px; border-color: transparent transparent #7b14c9 transparent; opacity: 0.7; }
.furniture:hover .resize-handle { display: block; }

.drag-preview { position: fixed; pointer-events: none; z-index: 10000; opacity: 0.8; transform: translate(-50%, -50%); }
</style>
</head>
<body>
<div class="top-bar">
  <h1>Homey</h1>
  <button class="top-btn" onclick="undo()">Undo</button>
  <button class="top-btn" onclick="clearRoom()">Clear</button>
  <span class="color-label">Wall</span><input type="color" id="wallColor" class="pat-color" oninput="setWallColor(this.value)">
  <div class="pattern-bar" id="wallPatterns"></div>
  <span class="color-label">Floor</span><input type="color" id="floorColor" class="pat-color" oninput="setFloorColor(this.value)">
  <div class="pattern-bar" id="floorPatterns"></div>
  <div class="room-tabs">
    <button class="room-tab active" onclick="switchRoom('bedroom')">Bedroom</button>
    <button class="room-tab" onclick="switchRoom('cafe')">Cafe</button>
    <button class="room-tab" onclick="switchRoom('gaming')">Gaming</button>
  </div>
</div>
<div class="main">
  <div class="palette" id="palette"></div>
  <div class="room-container"><div class="room" id="room"><div class="room-wall" id="roomWall"></div><div class="room-floor" id="roomFloor"></div><div class="room-line"></div></div></div>
</div>
<canvas class="drag-preview" id="dragPreview" style="display:none;" width="80" height="80"></canvas>

<script>
// ── Canvas Drawing Helpers ──
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();}
function darken(c,a){const d=document.createElement('canvas');const x=d.getContext('2d');x.fillStyle=c;x.fillRect(0,0,1,1);const p=x.getImageData(0,0,1,1).data;return`rgba(${Math.max(0,p[0]-a)},${Math.max(0,p[1]-a)},${Math.max(0,p[2]-a)},1)`;}
function lighten(c,a){const d=document.createElement('canvas');const x=d.getContext('2d');x.fillStyle=c;x.fillRect(0,0,1,1);const p=x.getImageData(0,0,1,1).data;return`rgba(${Math.min(255,p[0]+a)},${Math.min(255,p[1]+a)},${Math.min(255,p[2]+a)},1)`;}

// ── Draw Functions ── each takes (ctx, w, h, color)
const DRAWS = {
  // BEDROOM
  bed(ctx,w,h,c){
    ctx.fillStyle=darken(c,30);rr(ctx,0,h*0.55,w,h*0.45,4); // frame
    ctx.fillStyle=c;rr(ctx,2,h*0.3,w-4,h*0.35,4); // mattress
    ctx.fillStyle=lighten(c,40);rr(ctx,3,h*0.15,w*0.35,h*0.25,6); // pillow
    ctx.fillStyle=darken(c,15);rr(ctx,0,h*0.05,4,h*0.95,2); // headboard
    ctx.fillStyle=darken(c,15);rr(ctx,0,h*0.05,w*0.15,h*0.6,3);
  },
  bunkbed(ctx,w,h,c){
    ctx.fillStyle=darken(c,40);rr(ctx,0,0,5,h,2);rr(ctx,w-5,0,5,h,2); // posts
    ctx.fillStyle=darken(c,20);rr(ctx,5,h*0.45,w-10,4,1); // middle rail
    ctx.fillStyle=c;rr(ctx,5,h*0.48,w-10,h*0.22,3); // bottom mattress
    ctx.fillStyle=lighten(c,20);rr(ctx,5,h*0.05,w-10,h*0.22,3); // top mattress
    ctx.fillStyle=lighten(c,50);rr(ctx,8,h*0.08,w*0.25,h*0.12,4);rr(ctx,8,h*0.52,w*0.25,h*0.12,4);
  },
  couch(ctx,w,h,c){
    ctx.fillStyle=darken(c,20);rr(ctx,0,h*0.2,w,h*0.8,6);
    ctx.fillStyle=c;rr(ctx,5,h*0.3,w-10,h*0.45,5); // seat
    ctx.fillStyle=darken(c,10);rr(ctx,0,h*0.15,w*0.15,h*0.6,4); // arm L
    rr(ctx,w*0.85,h*0.15,w*0.15,h*0.6,4); // arm R
    ctx.fillStyle=lighten(c,25);rr(ctx,w*0.18,h*0.25,w*0.28,h*0.3,5);rr(ctx,w*0.54,h*0.25,w*0.28,h*0.3,5);
  },
  armchair(ctx,w,h,c){
    ctx.fillStyle=darken(c,20);rr(ctx,0,h*0.2,w,h*0.8,6);
    ctx.fillStyle=c;rr(ctx,w*0.15,h*0.3,w*0.7,h*0.4,5);
    ctx.fillStyle=darken(c,10);rr(ctx,0,h*0.15,w*0.18,h*0.55,4);rr(ctx,w*0.82,h*0.15,w*0.18,h*0.55,4);
    ctx.fillStyle=lighten(c,20);ctx.beginPath();ctx.arc(w/2,h*0.35,w*0.2,0,Math.PI*2);ctx.fill();
  },
  beanbag(ctx,w,h,c){
    ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(w/2,h*0.6,w*0.45,h*0.4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=lighten(c,20);ctx.beginPath();ctx.ellipse(w/2,h*0.4,w*0.3,h*0.25,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=darken(c,15);ctx.beginPath();ctx.ellipse(w/2,h*0.75,w*0.35,h*0.1,0,0,Math.PI*2);ctx.fill();
  },
  stool(ctx,w,h,c){
    ctx.fillStyle=darken(c,30);rr(ctx,w*0.15,h*0.4,w*0.1,h*0.6,2);rr(ctx,w*0.75,h*0.4,w*0.1,h*0.6,2);
    ctx.fillStyle=c;rr(ctx,0,h*0.25,w,h*0.2,5);
    ctx.fillStyle=lighten(c,15);rr(ctx,3,h*0.28,w-6,h*0.08,3);
  },
  bench(ctx,w,h,c){
    ctx.fillStyle=darken(c,30);rr(ctx,w*0.05,h*0.5,w*0.08,h*0.5,2);rr(ctx,w*0.87,h*0.5,w*0.08,h*0.5,2);
    ctx.fillStyle=c;rr(ctx,0,h*0.3,w,h*0.25,4);
    ctx.fillStyle=darken(c,10);for(let i=0;i<3;i++)rr(ctx,2+i*(w/3),h*0.32,w/3-4,h*0.08,2);
  },
  dresser(ctx,w,h,c){
    ctx.fillStyle=darken(c,20);rr(ctx,0,0,w,h,5);
    ctx.fillStyle=c;for(let i=0;i<3;i++)rr(ctx,3,4+i*(h/3),w-6,h/3-5,3);
    ctx.fillStyle=darken(c,40);for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(w/2,4+i*(h/3)+h/6-1,3,0,Math.PI*2);ctx.fill();}
  },
  shelf(ctx,w,h,c){
    ctx.fillStyle=darken(c,20);rr(ctx,0,0,w,h,3);
    ctx.fillStyle=c;rr(ctx,2,2,w-4,h-4,2);
    ctx.fillStyle=darken(c,30);rr(ctx,2,h*0.33,w-4,3,0);rr(ctx,2,h*0.66,w-4,3,0);
    ctx.fillStyle=lighten(c,30);rr(ctx,5,h*0.05,8,h*0.25,2);rr(ctx,16,h*0.1,10,h*0.2,2);rr(ctx,5,h*0.38,12,h*0.25,2);
  },
  wardrobe(ctx,w,h,c){
    ctx.fillStyle=darken(c,25);rr(ctx,0,0,w,h,4);
    ctx.fillStyle=c;rr(ctx,2,2,w/2-3,h-4,3);rr(ctx,w/2+1,2,w/2-3,h-4,3);
    ctx.fillStyle=darken(c,40);ctx.beginPath();ctx.arc(w*0.38,h/2,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*0.62,h/2,2.5,0,Math.PI*2);ctx.fill();
  },
  chest(ctx,w,h,c){
    ctx.fillStyle=darken(c,20);rr(ctx,0,h*0.15,w,h*0.85,5);
    ctx.fillStyle=c;rr(ctx,2,h*0.2,w-4,h*0.6,3);
    ctx.fillStyle=darken(c,30);rr(ctx,0,0,w,h*0.2,4);
    ctx.fillStyle=darken(c,45);rr(ctx,w*0.35,h*0.35,w*0.3,h*0.15,3);
  },
  basket(ctx,w,h,c){
    ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(w*0.1,h*0.3);ctx.lineTo(w*0.05,h);ctx.lineTo(w*0.95,h);ctx.lineTo(w*0.9,h*0.3);ctx.closePath();ctx.fill();
    ctx.fillStyle=darken(c,20);for(let i=0;i<4;i++)rr(ctx,w*0.08,h*0.35+i*h*0.16,w*0.84,h*0.06,1);
    ctx.fillStyle=darken(c,10);ctx.beginPath();ctx.ellipse(w/2,h*0.3,w*0.42,h*0.08,0,0,Math.PI*2);ctx.fill();
  },
  lamp(ctx,w,h,c){
    ctx.fillStyle=darken(c,30);rr(ctx,w*0.4,h*0.4,w*0.2,h*0.55,2);
    ctx.fillStyle=darken(c,20);ctx.beginPath();ctx.ellipse(w/2,h*0.95,w*0.3,h*0.06,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(w*0.15,h*0.45);ctx.lineTo(w*0.3,h*0.05);ctx.lineTo(w*0.7,h*0.05);ctx.lineTo(w*0.85,h*0.45);ctx.closePath();ctx.fill();
    ctx.fillStyle=lighten(c,40);ctx.beginPath();ctx.ellipse(w/2,h*0.25,w*0.15,h*0.12,0,0,Math.PI*2);ctx.fill();
  },
  ceilinglamp(ctx,w,h,c){
    ctx.fillStyle=darken(c,30);rr(ctx,w*0.47,0,w*0.06,h*0.3,1);
    ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(w*0.15,h*0.75);ctx.quadraticCurveTo(w*0.2,h*0.3,w/2,h*0.28);ctx.quadraticCurveTo(w*0.8,h*0.3,w*0.85,h*0.75);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff4';ctx.beginPath();ctx.ellipse(w/2,h*0.7,w*0.2,h*0.08,0,0,Math.PI*2);ctx.fill();
  },
  candle(ctx,w,h,c){
    ctx.fillStyle=c;rr(ctx,w*0.25,h*0.35,w*0.5,h*0.65,3);
    ctx.fillStyle=darken(c,15);rr(ctx,w*0.2,h*0.32,w*0.6,h*0.1,3);
    ctx.fillStyle='#333';rr(ctx,w*0.46,h*0.15,w*0.08,h*0.2,1);
    ctx.fillStyle='#ff9933';ctx.beginPath();ctx.ellipse(w/2,h*0.12,w*0.1,h*0.12,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffdd44';ctx.beginPath();ctx.ellipse(w/2,h*0.1,w*0.06,h*0.07,0,0,Math.PI*2);ctx.fill();
  },
  starlight(ctx,w,h,c){
    ctx.fillStyle=c;const cx=w/2,cy=h/2;
    for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2;const a2=a+Math.PI/5;
    ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*w*0.45,cy+Math.sin(a)*h*0.45);ctx.lineTo(cx+Math.cos(a2)*w*0.18,cy+Math.sin(a2)*h*0.18);ctx.lineTo(cx+Math.cos(a+Math.PI*2/5)*w*0.45,cy+Math.sin(a+Math.PI*2/5)*h*0.45);ctx.fill();}
    ctx.fillStyle=lighten(c,50);ctx.beginPath();ctx.arc(cx,cy,w*0.12,0,Math.PI*2);ctx.fill();
  },
  lantern(ctx,w,h,c){
    ctx.fillStyle=darken(c,30);rr(ctx,w*0.35,0,w*0.3,h*0.15,3);
    ctx.fillStyle=c;rr(ctx,w*0.15,h*0.15,w*0.7,h*0.7,8);
    ctx.fillStyle=lighten(c,50)+'88';rr(ctx,w*0.22,h*0.22,w*0.56,h*0.56,6);
    ctx.fillStyle=darken(c,30);rr(ctx,w*0.25,h*0.85,w*0.5,h*0.12,3);
    ctx.fillStyle='#ffdd44';ctx.beginPath();ctx.arc(w/2,h*0.5,w*0.12,0,Math.PI*2);ctx.fill();
  },
  fairy(ctx,w,h,c){
    ctx.strokeStyle=darken(c,20);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,h/2);ctx.bezierCurveTo(w*0.25,0,w*0.75,h,w,h/2);ctx.stroke();
    const cols=[c,lighten(c,30),lighten(c,60)];
    for(let i=0;i<8;i++){ctx.fillStyle=cols[i%3];const x=i*w/7.5;const y=h/2+Math.sin(i*1.2)*h*0.25;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}
  },
  plant(ctx,w,h,c){
    ctx.fillStyle=darken(c,20);rr(ctx,w*0.2,h*0.55,w*0.6,h*0.45,5);
    ctx.fillStyle=c;for(let i=0;i<3;i++){ctx.beginPath();const a=-0.5+i*0.5;ctx.ellipse(w/2+Math.sin(a)*w*0.15,h*0.35-i*h*0.1,w*0.18,h*0.15,-a*0.3,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle=darken(c,10);rr(ctx,w*0.44,h*0.35,w*0.12,h*0.25,1);
  },
  flower(ctx,w,h,c){
    ctx.fillStyle='#4a8';rr(ctx,w*0.44,h*0.4,w*0.12,h*0.6,2);
    ctx.fillStyle='#5b5';ctx.beginPath();ctx.ellipse(w*0.3,h*0.55,w*0.15,h*0.08,0.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c;for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.beginPath();ctx.ellipse(w/2+Math.cos(a)*w*0.18,h*0.25+Math.sin(a)*h*0.13,w*0.12,h*0.08,a,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle=lighten(c,60);ctx.beginPath();ctx.arc(w/2,h*0.25,w*0.1,0,Math.PI*2);ctx.fill();
  },
  cactus(ctx,w,h,c){
    ctx.fillStyle=c;rr(ctx,w*0.3,h*0.15,w*0.4,h*0.7,8);
    ctx.fillStyle=darken(c,10);rr(ctx,w*0.05,h*0.3,w*0.28,h*0.15,6);rr(ctx,w*0.67,h*0.2,w*0.28,h*0.15,6);
    ctx.fillStyle=darken(c,30);rr(ctx,w*0.25,h*0.8,w*0.5,h*0.2,4);
    ctx.fillStyle=lighten(c,30);ctx.beginPath();ctx.arc(w/2,h*0.12,w*0.08,0,Math.PI*2);ctx.fill();
  },
  mirror(ctx,w,h,c){
    ctx.fillStyle=darken(c,25);rr(ctx,0,0,w,h,6);
    ctx.fillStyle='#cde8f5';rr(ctx,3,3,w-6,h-6,5);
    ctx.fillStyle='#fff4';rr(ctx,5,5,w*0.3,h*0.4,3);
  },
  picture(ctx,w,h,c){
    ctx.fillStyle=darken(c,25);rr(ctx,0,0,w,h,3);
    ctx.fillStyle=c;rr(ctx,3,3,w-6,h-6,2);
    ctx.fillStyle=lighten(c,40);ctx.beginPath();ctx.moveTo(5,h-5);ctx.lineTo(w*0.3,h*0.3);ctx.lineTo(w*0.55,h*0.55);ctx.lineTo(w*0.7,h*0.35);ctx.lineTo(w-5,h-5);ctx.closePath();ctx.fill();
    ctx.fillStyle=lighten(c,60);ctx.beginPath();ctx.arc(w*0.7,h*0.25,w*0.1,0,Math.PI*2);ctx.fill();
  },
  clock(ctx,w,h,c){
    ctx.fillStyle=darken(c,20);ctx.beginPath();ctx.arc(w/2,h/2,w*0.45,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=lighten(c,50);ctx.beginPath();ctx.arc(w/2,h/2,w*0.38,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=darken(c,40);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(w/2,h/2);ctx.lineTo(w/2,h*0.22);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w/2,h/2);ctx.lineTo(w*0.68,h/2);ctx.stroke();
    ctx.fillStyle=darken(c,40);ctx.beginPath();ctx.arc(w/2,h/2,2,0,Math.PI*2);ctx.fill();
  },
  globe(ctx,w,h,c){
    ctx.fillStyle=darken(c,30);rr(ctx,w*0.35,h*0.75,w*0.3,h*0.05,1);rr(ctx,w*0.2,h*0.8,w*0.6,h*0.1,3);rr(ctx,w*0.46,h*0.55,w*0.08,h*0.25,1);
    ctx.fillStyle='#5599cc';ctx.beginPath();ctx.arc(w/2,h*0.35,w*0.38,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(w*0.4,h*0.3,w*0.15,h*0.2,0.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(w*0.65,h*0.4,w*0.1,h*0.12,0,0,Math.PI*2);ctx.fill();
  },
  window(ctx,w,h,c){
    ctx.fillStyle=darken(c,25);rr(ctx,0,0,w,h,4);

      { id:'telescope',draw:'telescope',label:'Telescope', w:35, h:55, color:'#6b7280' },
      { id:'snowglobe',draw:'snowglobe',label:'Snow Globe', w:40,h:45, color:'#92674a' },

      { id:'ivy',      draw:'ivy',      label:'Ivy',       w:40, h:55, color:'#22c55e' },
      { id:'fern',     draw:'fern',     label:'Fern',      w:45, h:55, color:'#22c55e' },

      { id:'ac',       draw:'ac',       label:'AC Unit',   w:70, h:30, color:'#f5f0e0' },
      { id:'map',      draw:'map',      label:'Map',       w:50, h:40, color:'#d4a24e' },
      { id:'compass',  draw:'compass',  label:'Compass',   w:30, h:30, color:'#92674a' },

    'Snacks': [

let currentRoom = 'bedroom';
let placed = { bedroom: [], cafe: [], gaming: [] };
let hist = { bedroom: [], cafe: [], gaming: [] };
let roomColors = { bedroom: {wall:'#e8d5f5',floor:'#c4956a',wallPat:'plain',floorPat:'wood'}, cafe: {wall:'#ffecd2',floor:'#8b6f5e',wallPat:'plain',floorPat:'tiles'}, gaming: {wall:'#1a1a2e',floor:'#2d2d44',wallPat:'plain',floorPat:'plain'} };

const WALL_PATTERNS = {
  plain:    { label:'Plain',     draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); }},
  stripes:  { label:'Stripes',   draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); ctx.fillStyle=darken(c,18); for(let i=0;i<w;i+=12) ctx.fillRect(i,0,6,h); }},
  dots:     { label:'Dots',      draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); ctx.fillStyle=darken(c,20); for(let y=4;y<h;y+=10) for(let x=(y%20<10?4:9);x<w;x+=10){ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();} }},
  diamonds: { label:'Diamonds',  draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); ctx.fillStyle=darken(c,15); for(let y=-8;y<h+8;y+=16) for(let x=(y%32<16?0:8);x<w;x+=16){ctx.beginPath();ctx.moveTo(x,y-6);ctx.lineTo(x+6,y);ctx.lineTo(x,y+6);ctx.lineTo(x-6,y);ctx.closePath();ctx.fill();} }},
  brick:    { label:'Brick',     draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); ctx.strokeStyle=darken(c,30); ctx.lineWidth=1; for(let y=0;y<h;y+=10){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke(); const off=y%20<10?0:12; for(let x=off;x<w;x+=24){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+10);ctx.stroke();}} }},
  stars:    { label:'Stars',     draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); ctx.fillStyle=lighten(c,25); for(let y=6;y<h;y+=14) for(let x=(y%28<14?6:13);x<w;x+=14){ const s=2.5; ctx.beginPath(); for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2; ctx.lineTo(x+Math.cos(a)*s,y+Math.sin(a)*s); const a2=a+Math.PI/5; ctx.lineTo(x+Math.cos(a2)*s*0.4,y+Math.sin(a2)*s*0.4);} ctx.closePath();ctx.fill();} }},
  hearts:   { label:'Hearts',    draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); ctx.fillStyle=lighten(c,20); for(let y=6;y<h;y+=14) for(let x=(y%28<14?6:13);x<w;x+=14){ ctx.beginPath(); ctx.moveTo(x,y+2); ctx.bezierCurveTo(x-3,y-2,x-6,y+2,x,y+5); ctx.bezierCurveTo(x+6,y+2,x+3,y-2,x,y+2); ctx.fill();} }},
  waves:    { label:'Waves',     draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); ctx.strokeStyle=darken(c,20); ctx.lineWidth=1.5; for(let y=6;y<h;y+=10){ctx.beginPath(); for(let x=0;x<w;x+=12){ctx.quadraticCurveTo(x+3,y-4,x+6,y);ctx.quadraticCurveTo(x+9,y+4,x+12,y);} ctx.stroke();} }},
};

const FLOOR_PATTERNS = {
  plain:      { label:'Plain',      draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); }},
  wood:       { label:'Wood',       draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); ctx.strokeStyle=darken(c,20); ctx.lineWidth=0.8; for(let y=0;y<h;y+=8){const off=y%16<8?0:w*0.4; ctx.fillStyle=((y/8)%2===0)?c:darken(c,8); ctx.fillRect(0,y,w,8); ctx.beginPath();ctx.moveTo(off,y);ctx.lineTo(off,y+8);ctx.stroke(); ctx.beginPath();ctx.moveTo(off+w*0.5,y);ctx.lineTo(off+w*0.5,y+8);ctx.stroke();} ctx.strokeStyle=darken(c,12); for(let y=0;y<h;y+=8){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();} }},
  tiles:      { label:'Tiles',      draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); ctx.strokeStyle=darken(c,25); ctx.lineWidth=1; for(let y=0;y<h;y+=14) for(let x=0;x<w;x+=14){ctx.strokeRect(x+0.5,y+0.5,13,13); ctx.fillStyle=lighten(c,5); ctx.fillRect(x+1,y+1,12,12); ctx.fillStyle=c;} }},
  checker:    { label:'Checker',    draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); ctx.fillStyle=darken(c,25); for(let y=0;y<h;y+=12) for(let x=0;x<w;x+=12){ if((x/12+y/12)%2===0) ctx.fillRect(x,y,12,12);} }},
  herringbone:{ label:'Herring',    draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); ctx.fillStyle=darken(c,15); for(let y=-10;y<h+10;y+=10) for(let x=-10;x<w+10;x+=20){ ctx.save(); ctx.translate(x,y); ctx.fillRect(0,0,4,10); ctx.fillStyle=darken(c,10); ctx.fillRect(5,0,4,10); ctx.restore(); ctx.save(); ctx.translate(x+10,y+5); ctx.fillRect(0,0,4,10); ctx.fillStyle=darken(c,10); ctx.fillRect(5,0,4,10); ctx.restore(); ctx.fillStyle=darken(c,15);} }},
  stone:      { label:'Stone',      draw(ctx,w,h,c){ ctx.fillStyle=c; ctx.fillRect(0,0,w,h); ctx.strokeStyle=darken(c,30); ctx.lineWidth=1.5; const stones=[[0,0,14,10],[14,0,12,10],[0,10,10,12],[10,10,16,12],[0,22,13,10],[13,22,13,10]]; for(let by=0;by<h;by+=32) for(let bx=0;bx<w;bx+=26) stones.forEach(([sx,sy,sw,sh])=>{ctx.strokeRect(bx+sx+0.5,by+sy+0.5,sw,sh); ctx.fillStyle=((sx+sy)%3===0)?darken(c,8):lighten(c,5); ctx.fillRect(bx+sx+1,by+sy+1,sw-1,sh-1);}); ctx.fillStyle=c; }},
  marble:     { label:'Marble',     draw(ctx,w,h,c){ ctx.fillStyle=lighten(c,10); ctx.fillRect(0,0,w,h); ctx.strokeStyle=darken(c,15); ctx.lineWidth=0.5; ctx.globalAlpha=0.4; for(let i=0;i<12;i++){ctx.beginPath(); let x=Math.random()*w, y=Math.random()*h; ctx.moveTo(x,y); for(let j=0;j<5;j++){x+=Math.random()*20-10;y+=Math.random()*20-10;ctx.lineTo(x,y);} ctx.stroke();} ctx.globalAlpha=1; }},
};
let dragItem = null, dragOffset = {x:0,y:0}, draggingEl = null, idCounter = 0;
const roomEl = document.getElementById('room');
const paletteEl = document.getElementById('palette');
const prevEl = document.getElementById('dragPreview');

function drawItem(canvas, drawId, w, h, color) {
  canvas.width = w * 2; canvas.height = h * 2;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  if (DRAWS[drawId]) DRAWS[drawId](ctx, w, h, color);
}

const wallEl = document.getElementById('roomWall');
const floorEl = document.getElementById('roomFloor');

function drawPatternBg(el, patterns, patId, color) {
  const pat = patterns[patId] || patterns.plain;
  const c = document.createElement('canvas'); c.width=64; c.height=64;
  const ctx = c.getContext('2d');
  pat.draw(ctx, 64, 64, color);
  el.style.background = `url(${c.toDataURL()})`;
  el.style.backgroundSize = '64px 64px';
}

function applyRoomBg() {
  const c = roomColors[currentRoom];
  drawPatternBg(wallEl, WALL_PATTERNS, c.wallPat, c.wall);
  drawPatternBg(floorEl, FLOOR_PATTERNS, c.floorPat, c.floor);
  document.getElementById('wallColor').value = c.wall;
  document.getElementById('floorColor').value = c.floor;
  renderPatternBtns();
}
function setWallColor(v) { roomColors[currentRoom].wall = v; applyRoomBg(); save(); }
function setFloorColor(v) { roomColors[currentRoom].floor = v; applyRoomBg(); save(); }
function setWallPat(id) { roomColors[currentRoom].wallPat = id; applyRoomBg(); save(); }
function setFloorPat(id) { roomColors[currentRoom].floorPat = id; applyRoomBg(); save(); }

function renderPatternBtns() {
  const c = roomColors[currentRoom];
  let wh = '';
  for (const [id, pat] of Object.entries(WALL_PATTERNS)) {
    wh += `<button class="pat-btn ${c.wallPat===id?'active':''}" onclick="setWallPat('${id}')" title="${pat.label}"><canvas id="wp_${id}" width="26" height="26"></canvas></button>`;
  }
  document.getElementById('wallPatterns').innerHTML = wh;
  for (const [id, pat] of Object.entries(WALL_PATTERNS)) {
    const cv = document.getElementById('wp_'+id); if(cv){const ctx=cv.getContext('2d'); pat.draw(ctx,26,26,c.wall);}
  }
  let fh = '';
  for (const [id, pat] of Object.entries(FLOOR_PATTERNS)) {
    fh += `<button class="pat-btn ${c.floorPat===id?'active':''}" onclick="setFloorPat('${id}')" title="${pat.label}"><canvas id="fp_${id}" width="26" height="26"></canvas></button>`;
  }
  document.getElementById('floorPatterns').innerHTML = fh;
  for (const [id, pat] of Object.entries(FLOOR_PATTERNS)) {
    const cv = document.getElementById('fp_'+id); if(cv){const ctx=cv.getContext('2d'); pat.draw(ctx,26,26,c.floor);}
  }
}

function switchRoom(name) {
  currentRoom = name;
  roomEl.className = 'room';
  document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.room-tab[onclick*="${name}"]`).classList.add('active');
  applyRoomBg(); renderPalette(); renderRoom();
}

function getAllItems() {
  const all = {};
  const seen = new Set();
  for (const [room, cats] of Object.entries(FURNITURE)) {
    for (const [catName, items] of Object.entries(cats)) {
      for (const f of items) {
        if (seen.has(f.id)) continue;
        seen.add(f.id);
        if (!all[catName]) all[catName] = [];
        all[catName].push(f);
      }
    }
  }
  return all;
}

function renderPalette(filter = '') {
  const allItems = getAllItems();
  let html = `<input class="palette-search" type="text" placeholder="Search..." oninput="renderPalette(this.value)" value="${filter}">`;
  const lf = filter.toLowerCase();
  for (const [catName, items] of Object.entries(allItems)) {
    const filtered = lf ? items.filter(f => f.label.toLowerCase().includes(lf)) : items;
    if (!filtered.length) continue;
    html += `<div class="palette-cat">${catName}</div><div class="palette-items">`;
    for (const f of filtered) {
      html += `<div class="palette-item" data-id="${f.id}" onmousedown="startDragNew(event,'${f.id}')" ontouchstart="startDragNew(event,'${f.id}')">
        <canvas id="pal_${f.id}" width="1" height="1"></canvas><span class="label">${f.label}</span></div>`;
    }
    html += `</div>`;
  }
  paletteEl.innerHTML = html;
  // Draw palette previews
  for (const items of Object.values(allItems)) {
    for (const f of items) {
      const c = document.getElementById('pal_' + f.id);
      if (c) drawItem(c, f.draw, 36, 36, f.color);
    }
  }
}

function renderRoom() {
  roomEl.querySelectorAll('.furniture').forEach(el => el.remove());
  placed[currentRoom].forEach(p => roomEl.appendChild(createFurnitureEl(p)));
}

function createFurnitureEl(p) {
  const el = document.createElement('div');
  el.className = 'furniture'; el.dataset.uid = p.uid;
  el.style.left = p.x+'px'; el.style.top = p.y+'px'; el.style.width = p.w+'px'; el.style.height = p.h+'px';
  const c = document.createElement('canvas');
  drawItem(c, p.draw, p.w, p.h, p.color);
  el.appendChild(c);
  const btnRow = document.createElement('div'); btnRow.className = 'btn-row';
  btnRow.innerHTML = `<button class="fb color-btn" title="Color" onmousedown="event.stopPropagation()">🎨<input type="color" value="${p.color}" onmousedown="event.stopPropagation()"></button><button class="fb" onmousedown="event.stopPropagation()" onclick="removeFurniture(${p.uid})">✕</button>`;
  const colorInput = btnRow.querySelector('input[type="color"]');
  colorInput.addEventListener('input', e => { e.stopPropagation(); const np = placed[currentRoom].find(i=>i.uid===p.uid); if(np){np.color=e.target.value; drawItem(c,np.draw,np.w,np.h,np.color);} });
  colorInput.addEventListener('change', e => { e.stopPropagation(); save(); });
  el.appendChild(btnRow);
  const rh = document.createElement('div'); rh.className = 'resize-handle';
  rh.addEventListener('mousedown', e => startResize(e, p.uid));
  rh.addEventListener('touchstart', e => startResize(e, p.uid), {passive:false});
  el.appendChild(rh);
  el.addEventListener('mousedown', e => startDragExisting(e, p.uid));
  el.addEventListener('touchstart', e => startDragExisting(e, p.uid), {passive:false});
  return el;
}

function getDef(id) {
  for (const room of Object.values(FURNITURE)) for (const items of Object.values(room)) { const f = items.find(i => i.id === id); if (f) return f; }
  return null;
}

function changeColor(uid, color) { saveHist(); const p = placed[currentRoom].find(i=>i.uid===uid); if(p){p.color=color; const el=roomEl.querySelector(`[data-uid="${uid}"]`); if(el){const c=el.querySelector('canvas');if(c)drawItem(c,p.draw,p.w,p.h,p.color);} save();} }

function startDragNew(e, id) {
  e.preventDefault(); const f = getDef(id); if (!f) return;
  dragItem = { type:'new', ...f, uid:++idCounter };
  const pos = getPos(e);
  drawItem(prevEl, f.draw, 60, 60, f.color);
  prevEl.style.display = 'block'; prevEl.style.left = pos.x+'px'; prevEl.style.top = pos.y+'px';
}

function startDragExisting(e, uid) {
  e.preventDefault(); const p = placed[currentRoom].find(i=>i.uid===uid); if(!p) return;
  const pos = getPos(e), rect = roomEl.getBoundingClientRect();
  dragOffset.x = pos.x-rect.left-p.x; dragOffset.y = pos.y-rect.top-p.y;
  dragItem = {type:'existing',uid};
  const el = roomEl.querySelector(`[data-uid="${uid}"]`);
  if(el){el.classList.add('dragging');draggingEl=el;}
}

let resizing = null; // {uid, startX, startY, startW, startH}
function startResize(e, uid) {
  e.preventDefault(); e.stopPropagation();
  const p = placed[currentRoom].find(i=>i.uid===uid); if(!p) return;
  saveHist();
  const pos = getPos(e);
  resizing = { uid, startX: pos.x, startY: pos.y, startW: p.w, startH: p.h };
}

function getPos(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}
document.addEventListener('mousemove',onMove);document.addEventListener('touchmove',onMove,{passive:false});
function onMove(e){
  if(resizing){e.preventDefault();const pos=getPos(e);const dx=pos.x-resizing.startX,dy=pos.y-resizing.startY;
    const p=placed[currentRoom].find(i=>i.uid===resizing.uid);if(!p)return;
    p.w=Math.max(20,resizing.startW+dx);p.h=Math.max(20,resizing.startH+dy);
    const el=roomEl.querySelector(`[data-uid="${resizing.uid}"]`);
    if(el){el.style.width=p.w+'px';el.style.height=p.h+'px';const c=el.querySelector('canvas');if(c)drawItem(c,p.draw,p.w,p.h,p.color);}
    return;}
  if(!dragItem)return;e.preventDefault();const pos=getPos(e);
  if(dragItem.type==='new'){prevEl.style.left=pos.x+'px';prevEl.style.top=pos.y+'px';}
  else if(draggingEl){const r=roomEl.getBoundingClientRect();let nx=pos.x-r.left-dragOffset.x,ny=pos.y-r.top-dragOffset.y;nx=Math.max(0,Math.min(r.width-draggingEl.offsetWidth,nx));ny=Math.max(0,Math.min(r.height-draggingEl.offsetHeight,ny));draggingEl.style.left=nx+'px';draggingEl.style.top=ny+'px';}}
document.addEventListener('mouseup',onEnd);document.addEventListener('touchend',onEnd);
function onEnd(e){if(resizing){resizing=null;save();return;}
  if(!dragItem)return;
  if(dragItem.type==='new'){prevEl.style.display='none';const pos=e.changedTouches?{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY}:{x:e.clientX,y:e.clientY};const r=roomEl.getBoundingClientRect();
    if(pos.x>=r.left&&pos.x<=r.right&&pos.y>=r.top&&pos.y<=r.bottom){saveHist();placed[currentRoom].push({uid:dragItem.uid,id:dragItem.id,draw:dragItem.draw,w:dragItem.w,h:dragItem.h,color:dragItem.color,x:Math.max(0,Math.min(r.width-dragItem.w,pos.x-r.left-dragItem.w/2)),y:Math.max(0,Math.min(r.height-dragItem.h,pos.y-r.top-dragItem.h/2))});renderRoom();save();}}
  else if(dragItem.type==='existing'&&draggingEl){saveHist();const p=placed[currentRoom].find(i=>i.uid===dragItem.uid);if(p){p.x=parseFloat(draggingEl.style.left);p.y=parseFloat(draggingEl.style.top);}draggingEl.classList.remove('dragging');draggingEl=null;save();}
  dragItem=null;}

function removeFurniture(uid){saveHist();placed[currentRoom]=placed[currentRoom].filter(p=>p.uid!==uid);renderRoom();save();}
function clearRoom(){if(!placed[currentRoom].length)return;saveHist();placed[currentRoom]=[];renderRoom();save();}
function saveHist(){hist[currentRoom].push(JSON.parse(JSON.stringify(placed[currentRoom])));if(hist[currentRoom].length>30)hist[currentRoom].shift();}
function undo(){if(!hist[currentRoom].length)return;placed[currentRoom]=hist[currentRoom].pop();renderRoom();save();}
function save(){try{localStorage.setItem('homey_rooms2',JSON.stringify({placed,roomColors}));}catch{}}
function load(){try{const d=JSON.parse(localStorage.getItem('homey_rooms2'));if(d){if(d.placed){placed={bedroom:d.placed.bedroom||[],cafe:d.placed.cafe||[],gaming:d.placed.gaming||[]};} else {placed={bedroom:d.bedroom||[],cafe:d.cafe||[],gaming:d.gaming||[]};}if(d.roomColors){Object.assign(roomColors,d.roomColors);}let m=0;Object.values(placed).forEach(a=>a.forEach(p=>{if(p.uid>m)m=p.uid;}));idCounter=m;}}catch{}}
load();applyRoomBg();renderPalette();renderRoom();
</script>
