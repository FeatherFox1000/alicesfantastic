<svg xmlns="http://www.w3.org/2000/svg" width="200" height="130" viewBox="0 0 200 130">
  <defs>
    <radialGradient id="sky" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#4a90d9"/>
    </radialGradient>
    <radialGradient id="grass" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#7ec850"/>
      <stop offset="100%" stop-color="#4a9c2a"/>
    </radialGradient>
    <radialGradient id="body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#c86a00"/>
    </radialGradient>
    <radialGradient id="head" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ffe0b2"/>
      <stop offset="100%" stop-color="#e8a070"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#00000040"/>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="200" height="130" fill="url(#sky)"/>
  <!-- Ground -->
  <ellipse cx="100" cy="115" rx="90" ry="20" fill="url(#grass)"/>
  <!-- Clouds -->
  <ellipse cx="40" cy="28" rx="20" ry="10" fill="white" opacity="0.9"/>
  <ellipse cx="55" cy="22" rx="15" ry="9" fill="white" opacity="0.9"/>
  <ellipse cx="160" cy="35" rx="18" ry="9" fill="white" opacity="0.85"/>
  <!-- 3D Character body -->
  <ellipse cx="100" cy="95" rx="22" ry="14" fill="#c86a00" opacity="0.4" filter="url(#shadow)"/>
  <ellipse cx="100" cy="90" rx="18" ry="22" fill="url(#body)" filter="url(#shadow)"/>
  <!-- Head -->
  <circle cx="100" cy="62" r="20" fill="url(#head)" filter="url(#shadow)"/>
  <!-- Eyes -->
  <circle cx="93" cy="59" r="5" fill="white"/>
  <circle cx="107" cy="59" r="5" fill="white"/>
  <circle cx="94" cy="60" r="3" fill="#3a2000"/>
  <circle cx="108" cy="60" r="3" fill="#3a2000"/>
  <circle cx="95" cy="59" r="1" fill="white"/>
  <circle cx="109" cy="59" r="1" fill="white"/>
  <!-- Smile -->
  <path d="M93 67 Q100 73 107 67" stroke="#c86a00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Ears -->
  <ellipse cx="80" cy="60" rx="5" ry="8" fill="url(#head)" filter="url(#shadow)"/>
  <ellipse cx="120" cy="60" rx="5" ry="8" fill="url(#head)" filter="url(#shadow)"/>
</svg>
