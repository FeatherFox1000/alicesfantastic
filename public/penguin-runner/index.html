<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penguin Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }

    #customize-btn {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(74, 144, 217, 0.9);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      z-index: 5;
      letter-spacing: 1px;
    }
    #customize-btn:hover { background: rgba(53, 122, 189, 0.95); }

    #customize-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10, 10, 30, 0.93);
      z-index: 20;
      justify-content: center;
      align-items: center;
    }
    #customize-overlay.open { display: flex; }

    #customize-panel {
      background: #1a1a2e;
      border: 3px solid #4a90d9;
      border-radius: 14px;
      padding: 24px 28px;
      max-width: 520px;
      width: 90%;
      text-align: center;
    }
    #customize-panel h2 {
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }
    .presets-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .preset-option {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .preset-option canvas {
      border-radius: 10px;
      border: 3px solid transparent;
      width: 80px !important;
      height: 80px !important;
      image-rendering: pixelated;
    }
    .preset-option.selected canvas { border-color: #4a90d9; }
    .preset-option span {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #aaa;
    }
    .preset-option.selected span { color: #4a90d9; font-weight: bold; }
    .preset-option:hover canvas { border-color: #6aafe0; }

    #customize-back {
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 32px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #customize-back:hover { background: #357abd; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <button id="customize-btn" onclick="showCustomize()">🎨 CUSTOMIZE</button>

  <div id="customize-overlay">
    <div id="customize-panel">
      <h2>🐧 CHOOSE YOUR PENGUIN</h2>
      <div class="presets-grid" id="presets-grid"></div>
      <button id="customize-back" onclick="hideCustomize()">▶ BACK</button>
    </div>
  </div>

  <script>
    function submitScore(game, score) {
      window.parent.postMessage({ type: 'gameScore', game, score }, '*');
      const token = localStorage.getItem('site_token');
      if (!token) return;
      const api = window.location.hostname === 'localhost'
        ? 'http://localhost:3001/api/auth' : 'https://ai-rp-studio.fly.dev/api/site-auth';
      fetch(api + '/scores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ game, score }),
      }).catch(() => {});
    }

    // Penguin color presets (shared with jumping-penguin via localStorage)
    const PRESETS = [
      { name: 'Classic',  body: '#1a1a2e', belly: '#ffffff', beak: '#FF8C00', wing: '#2a2a4e' },
      { name: 'Ocean',    body: '#0d2a4a', belly: '#b8dff0', beak: '#FFB347', wing: '#1a3d5a' },
      { name: 'Grape',    body: '#2d0a50', belly: '#e0b8f8', beak: '#FF8C00', wing: '#3d1a60' },
      { name: 'Flamingo', body: '#50102d', belly: '#ffc8e0', beak: '#FF69B4', wing: '#601a3d' },
      { name: 'Forest',   body: '#0d3d0d', belly: '#b8f0b8', beak: '#FF8C00', wing: '#1a4d1a' },
      { name: 'Cherry',   body: '#500d0d', belly: '#f8c0c0', beak: '#FF8C00', wing: '#601a1a' },
      { name: 'Honey',    body: '#3d2800', belly: '#fff0a0', beak: '#FF6B00', wing: '#4d3400' },
      { name: 'Teal',     body: '#0d3d3d', belly: '#a8f0e8', beak: '#FF8C00', wing: '#1a4d4d' },
    ];

    const API_SETTINGS = window.location.hostname === 'localhost'
      ? 'http://localhost:3003/api/site-auth/settings'
      : 'https://ai-rp-studio.fly.dev/api/site-auth/settings';

    function loadColorsLocal() {
      try {
        const saved = localStorage.getItem('penguinColors');
        if (saved) return JSON.parse(saved);
      } catch {}
      return PRESETS[0];
    }

    async function loadColorsFromServer() {
      const token = localStorage.getItem('site_token');
      if (!token) return null;
      try {
        const res = await fetch(API_SETTINGS + '/penguinColors', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
          const data = await res.json();
          if (data.value) return JSON.parse(data.value);
        }
      } catch {}
      return null;
    }

    async function saveColorsToServer(colors) {
      const token = localStorage.getItem('site_token');
      if (!token) return;
      try {
        await fetch(API_SETTINGS + '/penguinColors', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ value: JSON.stringify(colors) })
        });
      } catch {}
    }

    let penguinColors = loadColorsLocal();
    let selectedPresetIndex = PRESETS.findIndex(p => p.body === penguinColors.body);
    if (selectedPresetIndex < 0) selectedPresetIndex = 0;

    // Load from server (overrides local if logged in)
    loadColorsFromServer().then(serverColors => {
      if (serverColors) {
        penguinColors = serverColors;
        localStorage.setItem('penguinColors', JSON.stringify(serverColors));
        selectedPresetIndex = PRESETS.findIndex(p => p.body === serverColors.body);
        if (selectedPresetIndex < 0) selectedPresetIndex = 0;
      }
    });

    // Check if current user is admin (for gold chain)
    let isAdmin = false;
    (async () => {
      const token = localStorage.getItem('site_token');
      if (!token) return;
      const api = window.location.hostname === 'localhost'
        ? 'http://localhost:3003/api/site-auth'
        : 'https://ai-rp-studio.fly.dev/api/site-auth';
      try {
        const res = await fetch(api + '/me', { headers: { 'Authorization': 'Bearer ' + token } });
        if (res.ok) { const d = await res.json(); isAdmin = !!d.is_admin; }
      } catch {}
    })();

    function saveColors(preset, index) {
      penguinColors = preset;
      selectedPresetIndex = index;
      localStorage.setItem('penguinColors', JSON.stringify(preset));
      saveColorsToServer(preset);
      buildPresetsGrid();
    }

    // Draw a mini preview penguin (standing) on a small canvas
    function drawPreviewPenguin(cv, colors) {
      const c = cv.getContext('2d');
      const W = cv.width, H = cv.height;
      c.clearRect(0, 0, W, H);

      // Background
      c.fillStyle = '#0d0d1e';
      c.fillRect(0, 0, W, H);

      const px = W * 0.15;
      const bottomY = H - 4;

      // Body
      c.fillStyle = colors.body;
      c.beginPath();
      c.ellipse(px + W * 0.36, bottomY - H * 0.38, W * 0.28, H * 0.36, 0, 0, Math.PI * 2);
      c.fill();

      // White belly
      c.fillStyle = colors.belly;
      c.beginPath();
      c.ellipse(px + W * 0.38, bottomY - H * 0.32, W * 0.16, H * 0.26, 0, 0, Math.PI * 2);
      c.fill();

      // Head
      c.fillStyle = colors.body;
      c.beginPath();
      c.arc(px + W * 0.36, bottomY - H * 0.68, W * 0.2, 0, Math.PI * 2);
      c.fill();

      // Eye
      c.fillStyle = colors.belly;
      c.beginPath();
      c.arc(px + W * 0.44, bottomY - H * 0.72, W * 0.08, 0, Math.PI * 2);
      c.fill();
      c.fillStyle = '#000';
      c.beginPath();
      c.arc(px + W * 0.46, bottomY - H * 0.72, W * 0.04, 0, Math.PI * 2);
      c.fill();

      // Beak
      c.fillStyle = colors.beak;
      c.beginPath();
      c.moveTo(px + W * 0.54, bottomY - H * 0.67);
      c.lineTo(px + W * 0.70, bottomY - H * 0.62);
      c.lineTo(px + W * 0.54, bottomY - H * 0.59);
      c.closePath();
      c.fill();

      // Wings
      c.fillStyle = colors.wing;
      c.beginPath();
      c.moveTo(px + W * 0.10, bottomY - H * 0.44);
      c.lineTo(px + W * 0.00, bottomY - H * 0.22);
      c.lineTo(px + W * 0.18, bottomY - H * 0.30);
      c.closePath();
      c.fill();

      // Feet
      c.fillStyle = colors.beak;
      c.fillRect(px + W * 0.18, bottomY - 4, W * 0.16, 4);
      c.fillRect(px + W * 0.40, bottomY - 4, W * 0.16, 4);
    }

    function buildPresetsGrid() {
      const grid = document.getElementById('presets-grid');
      grid.innerHTML = '';
      PRESETS.forEach((preset, i) => {
        const div = document.createElement('div');
        div.className = 'preset-option' + (i === selectedPresetIndex ? ' selected' : '');
        div.onclick = () => { saveColors(preset, i); };

        const cv = document.createElement('canvas');
        cv.width = 60;
        cv.height = 60;
        drawPreviewPenguin(cv, preset);

        const label = document.createElement('span');
        label.textContent = preset.name;

        div.appendChild(cv);
        div.appendChild(label);
        grid.appendChild(div);
      });
    }

    function showCustomize() {
      buildPresetsGrid();
      document.getElementById('customize-overlay').classList.add('open');
    }

    function hideCustomize() {
      document.getElementById('customize-overlay').classList.remove('open');
    }

    document.getElementById('customize-overlay').addEventListener('click', function(e) {
      if (e.target === this) hideCustomize();
    });

    const canvas = document.getElementById('game');
    const displayCtx = canvas.getContext('2d');

    // Pixel art: render at low res, scale up
    const BASE_WIDTH = 600;
    const BASE_HEIGHT = 200;
    const PIXEL_SCALE = 1;

    // Offscreen canvas for low-res rendering
    const offscreen = document.createElement('canvas');
    offscreen.width = BASE_WIDTH;
    offscreen.height = BASE_HEIGHT;
    const ctx = offscreen.getContext('2d');

    let scale = 1;

    function resize() {
      const maxW = window.innerWidth;
      const maxH = window.innerHeight;
      scale = Math.min(maxW / (BASE_WIDTH * PIXEL_SCALE), maxH / (BASE_HEIGHT * PIXEL_SCALE));
      canvas.width = BASE_WIDTH * PIXEL_SCALE * scale;
      canvas.height = BASE_HEIGHT * PIXEL_SCALE * scale;
      displayCtx.imageSmoothingEnabled = false;
    }
    resize();
    window.addEventListener('resize', resize);

    // Colors
    const SKY_TOP = '#87CEEB';
    const SKY_BOTTOM = '#E0F0FF';
    const GROUND_COLOR = '#E8E8E8';
    const GROUND_LINE = '#C0C0C0';
    const ICE_COLOR = '#B0D4F1';
    const ICE_HIGHLIGHT = '#D6EAFF';
    const ICE_SHADOW = '#7FAED4';

    // Game state
    let gameState = 'waiting'; // waiting, playing, dead
    let score = 0;
    let highScore = parseInt(localStorage.getItem('penguinRunnerHigh') || '0');
    let gameSpeed = 7;
    let frameCount = 0;

    // Ground
    const GROUND_Y = 150;

    // Penguin
    const penguin = {
      x: 15,
      y: GROUND_Y,
      width: 9,
      height: 12,
      velocityY: 0,
      jumping: false,
      ducking: false,
      walkFrame: 0,
      walkTimer: 0
    };

    const GRAVITY = 0.45;
    const JUMP_FORCE = -7.5;
    const DUCK_HEIGHT = 7;
    const NORMAL_HEIGHT = 12;

    // Obstacles
    let obstacles = [];
    let obstacleTimer = 0;
    const MIN_OBSTACLE_GAP = 60;

    // Snowflakes (decoration)
    let snowflakes = [];
    for (let i = 0; i < 25; i++) {
      snowflakes.push({
        x: Math.random() * BASE_WIDTH,
        y: Math.random() * GROUND_Y,
        size: 2,
        speed: Math.random() * 0.4 + 0.2
      });
    }

    // Clouds
    let clouds = [];
    for (let i = 0; i < 5; i++) {
      clouds.push({
        x: Math.random() * BASE_WIDTH,
        y: 10 + Math.random() * 40,
        width: 40 + Math.random() * 30,
        speed: 0.15 + Math.random() * 0.15
      });
    }

    // Mountains (background)
    const mountains = [];
    for (let i = 0; i < 8; i++) {
      mountains.push({
        x: i * 100,
        height: 30 + Math.random() * 40,
        width: 80 + Math.random() * 60
      });
    }
    let mountainOffset = 0;

    // Input
    let jumpPressed = false;
    let duckPressed = false;

    function handleKeyDown(e) {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        jumpPressed = true;
        if (gameState === 'waiting') startGame();
        else if (gameState === 'dead') restartGame();
      }
      if (e.code === 'ArrowDown') {
        e.preventDefault();
        duckPressed = true;
      }
    }

    function handleKeyUp(e) {
      if (e.code === 'Space' || e.code === 'ArrowUp') jumpPressed = false;
      if (e.code === 'ArrowDown') duckPressed = false;
    }

    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);

    // Touch support
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touchY = e.touches[0].clientY / (scale * PIXEL_SCALE);
      if (touchY > BASE_HEIGHT * 0.6) {
        duckPressed = true;
      } else {
        jumpPressed = true;
      }
      if (gameState === 'waiting') startGame();
      else if (gameState === 'dead') restartGame();
    });
    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      jumpPressed = false;
      duckPressed = false;
    });

    // Mouse click support
    canvas.addEventListener('mousedown', (e) => {
      if (gameState === 'waiting') startGame();
      else if (gameState === 'dead') restartGame();
      else jumpPressed = true;
    });
    canvas.addEventListener('mouseup', () => { jumpPressed = false; });

    function startGame() {
      gameState = 'playing';
      score = 0;
      gameSpeed = 12;
      obstacles = [];
      obstacleTimer = 0;
    }

    function restartGame() {
      penguin.y = GROUND_Y;
      penguin.velocityY = 0;
      penguin.jumping = false;
      penguin.ducking = false;
      startGame();
    }

    function spawnObstacle() {
      const type = Math.random();
      if (type < 0.45) {
        // Small ice block
        obstacles.push({
          x: BASE_WIDTH + 5,
          y: GROUND_Y,
          width: 15,
          height: 20,
          type: 'ice_small'
        });
      } else if (type < 0.75) {
        // Tall ice block
        obstacles.push({
          x: BASE_WIDTH + 5,
          y: GROUND_Y - 8,
          width: 15,
          height: 35,
          type: 'ice_tall'
        });
      } else {
        // Double ice blocks
        obstacles.push({
          x: BASE_WIDTH + 5,
          y: GROUND_Y,
          width: 25,
          height: 20,
          type: 'ice_double'
        });
      }
    }

    // Drawing functions
    function drawSky() {
      const gradient = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
      gradient.addColorStop(0, SKY_TOP);
      gradient.addColorStop(1, SKY_BOTTOM);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, BASE_WIDTH, GROUND_Y);
    }

    function drawMountains() {
      ctx.fillStyle = '#D0E0F0';
      for (const m of mountains) {
        const mx = ((m.x - mountainOffset * 0.3) % (BASE_WIDTH + 200)) - 100;
        ctx.beginPath();
        ctx.moveTo(mx - m.width / 2, GROUND_Y);
        ctx.lineTo(mx, GROUND_Y - m.height);
        ctx.lineTo(mx + m.width / 2, GROUND_Y);
        ctx.closePath();
        ctx.fill();
        // Snow cap
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.moveTo(mx - m.width * 0.15, GROUND_Y - m.height + m.height * 0.25);
        ctx.lineTo(mx, GROUND_Y - m.height);
        ctx.lineTo(mx + m.width * 0.15, GROUND_Y - m.height + m.height * 0.25);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#D0E0F0';
      }
    }

    function drawClouds() {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
      for (const c of clouds) {
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, c.width / 2, 12, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(c.x - c.width * 0.25, c.y + 5, c.width * 0.3, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(c.x + c.width * 0.2, c.y + 3, c.width * 0.25, 8, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawGround() {
      ctx.fillStyle = GROUND_COLOR;
      ctx.fillRect(0, GROUND_Y + penguin.height, BASE_WIDTH, BASE_HEIGHT - GROUND_Y);
      ctx.strokeStyle = GROUND_LINE;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y + penguin.height);
      ctx.lineTo(BASE_WIDTH, GROUND_Y + penguin.height);
      ctx.stroke();
      // Ground texture dots
      ctx.fillStyle = '#D0D0D0';
      for (let i = 0; i < 30; i++) {
        const dotX = ((i * 28 + frameCount * gameSpeed * 0.5) % (BASE_WIDTH + 10)) - 5;
        ctx.fillRect(dotX, GROUND_Y + penguin.height + 5 + (i % 3) * 8, 2, 1);
      }
    }

    function drawSnowflakes() {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      for (const s of snowflakes) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawPenguin() {
      const px = penguin.x;
      const py = penguin.y;
      const h = penguin.ducking ? DUCK_HEIGHT : NORMAL_HEIGHT;
      const bottomY = py + NORMAL_HEIGHT;

      if (penguin.ducking) {
        // Ducking penguin - wider and shorter
        // Body (oval, horizontal)
        ctx.fillStyle = penguinColors.body;
        ctx.beginPath();
        ctx.ellipse(px + 15, bottomY - 12, 18, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        // White belly
        ctx.fillStyle = penguinColors.belly;
        ctx.beginPath();
        ctx.ellipse(px + 17, bottomY - 10, 10, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // Head
        ctx.fillStyle = penguinColors.body;
        ctx.beginPath();
        ctx.arc(px + 28, bottomY - 16, 8, 0, Math.PI * 2);
        ctx.fill();

        // Eye
        ctx.fillStyle = penguinColors.belly;
        ctx.beginPath();
        ctx.arc(px + 31, bottomY - 18, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(px + 32, bottomY - 18, 1.5, 0, Math.PI * 2);
        ctx.fill();

        // Beak
        ctx.fillStyle = penguinColors.beak;
        ctx.beginPath();
        ctx.moveTo(px + 35, bottomY - 16);
        ctx.lineTo(px + 40, bottomY - 14);
        ctx.lineTo(px + 35, bottomY - 13);
        ctx.closePath();
        ctx.fill();

        // Feet
        ctx.fillStyle = penguinColors.beak;
        ctx.fillRect(px + 5, bottomY - 2, 8, 3);
        ctx.fillRect(px + 18, bottomY - 2, 8, 3);

        // Gold chain (admin only) — diagonal drape, ducking
        if (isAdmin) {
          const x1 = px + 8,  y1 = bottomY - 27;
          const x2 = px + 32, y2 = bottomY - 19;
          const numLinks = 6;
          const angle = Math.atan2(y2 - y1, x2 - x1);

          ctx.strokeStyle = '#CC8800';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();

          for (let i = 0; i < numLinks; i++) {
            const t = i / (numLinks - 1);
            const lx = x1 + t * (x2 - x1);
            const ly = y1 + t * (y2 - y1);
            ctx.fillStyle = i % 2 === 0 ? '#FFD700' : '#FFA500';
            ctx.strokeStyle = '#CC8800';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.ellipse(lx, ly, 3.5, 2, angle, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = '#FFEC6E';
            ctx.beginPath();
            ctx.ellipse(lx - 0.5, ly - 0.5, 1.2, 0.7, angle, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      } else {
        // Standing penguin
        // Body
        ctx.fillStyle = penguinColors.body;
        ctx.beginPath();
        ctx.ellipse(px + 15, bottomY - 18, 14, 18, 0, 0, Math.PI * 2);
        ctx.fill();

        // White belly
        ctx.fillStyle = penguinColors.belly;
        ctx.beginPath();
        ctx.ellipse(px + 16, bottomY - 15, 8, 13, 0, 0, Math.PI * 2);
        ctx.fill();

        // Head
        ctx.fillStyle = penguinColors.body;
        ctx.beginPath();
        ctx.arc(px + 15, bottomY - 34, 10, 0, Math.PI * 2);
        ctx.fill();

        // Eye
        ctx.fillStyle = penguinColors.belly;
        ctx.beginPath();
        ctx.arc(px + 19, bottomY - 36, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(px + 20, bottomY - 36, 2, 0, Math.PI * 2);
        ctx.fill();

        // Beak
        ctx.fillStyle = penguinColors.beak;
        ctx.beginPath();
        ctx.moveTo(px + 24, bottomY - 33);
        ctx.lineTo(px + 32, bottomY - 31);
        ctx.lineTo(px + 24, bottomY - 29);
        ctx.closePath();
        ctx.fill();

        // Wings (flap when jumping)
        ctx.fillStyle = penguinColors.wing;
        if (penguin.jumping) {
          // Wings up
          ctx.beginPath();
          ctx.moveTo(px + 2, bottomY - 22);
          ctx.lineTo(px - 6, bottomY - 32);
          ctx.lineTo(px + 4, bottomY - 16);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(px + 28, bottomY - 22);
          ctx.lineTo(px + 36, bottomY - 32);
          ctx.lineTo(px + 26, bottomY - 16);
          ctx.closePath();
          ctx.fill();
        } else {
          // Wings down, animated walk
          const wingBob = Math.sin(penguin.walkFrame * 0.3) * 3;
          ctx.beginPath();
          ctx.moveTo(px + 2, bottomY - 22);
          ctx.lineTo(px - 4, bottomY - 10 + wingBob);
          ctx.lineTo(px + 5, bottomY - 14);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(px + 28, bottomY - 22);
          ctx.lineTo(px + 34, bottomY - 10 - wingBob);
          ctx.lineTo(px + 25, bottomY - 14);
          ctx.closePath();
          ctx.fill();
        }

        // Feet with walk animation
        ctx.fillStyle = penguinColors.beak;
        if (gameState === 'playing' && !penguin.jumping) {
          const footOffset = Math.sin(penguin.walkFrame * 0.3) * 3;
          ctx.fillRect(px + 6 + footOffset, bottomY - 2, 8, 3);
          ctx.fillRect(px + 18 - footOffset, bottomY - 2, 8, 3);
        } else {
          ctx.fillRect(px + 6, bottomY - 2, 8, 3);
          ctx.fillRect(px + 18, bottomY - 2, 8, 3);
        }

        // Gold chain (admin only) — diagonal drape across chest
        if (isAdmin) {
          const x1 = px + 3, y1 = bottomY - 33;
          const x2 = px + 27, y2 = bottomY - 23;
          const numLinks = 7;
          const angle = Math.atan2(y2 - y1, x2 - x1);

          // Connecting line
          ctx.strokeStyle = '#CC8800';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();

          // Chain links (oval shapes along the line)
          for (let i = 0; i < numLinks; i++) {
            const t = i / (numLinks - 1);
            const lx = x1 + t * (x2 - x1);
            const ly = y1 + t * (y2 - y1);
            ctx.fillStyle = i % 2 === 0 ? '#FFD700' : '#FFA500';
            ctx.strokeStyle = '#CC8800';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.ellipse(lx, ly, 3.5, 2, angle, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            // Highlight gleam
            ctx.fillStyle = '#FFEC6E';
            ctx.beginPath();
            ctx.ellipse(lx - 0.5, ly - 0.5, 1.2, 0.7, angle, 0, Math.PI * 2);
            ctx.fill();
          }

        }
      }
    }

    function drawObstacle(obs) {
      const bottomY = GROUND_Y + NORMAL_HEIGHT;

      if (obs.type === 'snowball') {
        // Flying snowball
        const r = obs.width / 2;
        // Dark outline for visibility
        ctx.strokeStyle = '#7FAED4';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(obs.x + r, obs.y + r, r, 0, Math.PI * 2);
        ctx.stroke();
        // White fill
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(obs.x + r, obs.y + r, r, 0, Math.PI * 2);
        ctx.fill();
        // Shading
        ctx.fillStyle = '#C8DCF0';
        ctx.beginPath();
        ctx.arc(obs.x + r * 1.2, obs.y + r * 1.2, r * 0.5, 0, Math.PI * 2);
        ctx.fill();
        // Highlight
        ctx.fillStyle = '#E0E8F0';
        ctx.beginPath();
        ctx.arc(obs.x + r * 0.7, obs.y + r * 0.7, r * 0.3, 0, Math.PI * 2);
        ctx.fill();
        // Motion lines
        ctx.strokeStyle = '#7FAED4';
        ctx.lineWidth = 2;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(obs.x + obs.width + 2 + i * 6, obs.y + 3 + i * 5);
          ctx.lineTo(obs.x + obs.width + 8 + i * 6, obs.y + 3 + i * 5);
          ctx.stroke();
        }
      } else {
        // Ice blocks
        const w = obs.width;
        const h = obs.height;
        const bx = obs.x;
        const by = bottomY - h;

        // Main ice block
        ctx.fillStyle = ICE_COLOR;
        ctx.fillRect(bx, by, w, h);

        // Highlight
        ctx.fillStyle = ICE_HIGHLIGHT;
        ctx.fillRect(bx + 2, by + 2, w * 0.3, h - 4);

        // Shadow edge
        ctx.fillStyle = ICE_SHADOW;
        ctx.fillRect(bx + w - 3, by + 2, 3, h - 4);
        ctx.fillRect(bx + 2, by + h - 3, w - 4, 3);

        // Crack details
        ctx.strokeStyle = 'rgba(100, 160, 200, 0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(bx + w * 0.5, by + 3);
        ctx.lineTo(bx + w * 0.4, by + h * 0.4);
        ctx.lineTo(bx + w * 0.6, by + h * 0.7);
        ctx.stroke();

        if (obs.type === 'ice_double') {
          // Second block on top
          ctx.fillStyle = ICE_COLOR;
          ctx.fillRect(bx + 5, by - 18, w - 10, 18);
          ctx.fillStyle = ICE_HIGHLIGHT;
          ctx.fillRect(bx + 7, by - 16, (w - 10) * 0.3, 14);
        }
      }
    }

    function drawScore() {
      ctx.fillStyle = '#555';
      ctx.font = 'bold 16px Courier New';
      ctx.textAlign = 'right';
      const scoreText = String(Math.floor(score)).padStart(5, '0');
      ctx.fillText(scoreText, BASE_WIDTH - 15, 25);
      if (highScore > 0) {
        ctx.fillStyle = '#999';
        ctx.font = '12px Courier New';
        ctx.fillText('HI ' + String(highScore).padStart(5, '0'), BASE_WIDTH - 15, 42);
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

      ctx.fillStyle = '#1a1a2e';
      ctx.font = 'bold 28px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('PENGUIN RUNNER', BASE_WIDTH / 2, 70);

      ctx.fillStyle = '#555';
      ctx.font = '14px Courier New';
      ctx.fillText('Press SPACE or tap to start', BASE_WIDTH / 2, 100);

      ctx.font = '11px Courier New';
      ctx.fillStyle = '#777';
      ctx.fillText('SPACE / UP = Jump    DOWN = Duck', BASE_WIDTH / 2, 125);
      ctx.fillText('Tap top half = Jump    Tap bottom = Duck', BASE_WIDTH / 2, 145);
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

      ctx.fillStyle = '#1a1a2e';
      ctx.font = 'bold 24px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', BASE_WIDTH / 2, 70);

      ctx.fillStyle = '#555';
      ctx.font = '16px Courier New';
      ctx.fillText('Score: ' + Math.floor(score), BASE_WIDTH / 2, 100);

      if (Math.floor(score) >= highScore && score > 0) {
        ctx.fillStyle = '#FF8C00';
        ctx.font = 'bold 14px Courier New';
        ctx.fillText('NEW HIGH SCORE!', BASE_WIDTH / 2, 125);
      }

      ctx.fillStyle = '#777';
      ctx.font = '12px Courier New';
      ctx.fillText('Press SPACE or tap to play again', BASE_WIDTH / 2, 150);
    }

    function checkCollision(obs) {
      const pH = penguin.ducking ? DUCK_HEIGHT : NORMAL_HEIGHT;
      const pBottom = penguin.y + NORMAL_HEIGHT;
      const pTop = pBottom - pH;
      // Penguin visual body is roughly 30px wide centered around px+15
      const pLeft = penguin.x + 4;
      const pRight = penguin.x + 26;

      let oLeft, oRight, oTop, oBottom;

      if (obs.type === 'snowball') {
        oLeft = obs.x + 2;
        oRight = obs.x + obs.width - 2;
        oTop = obs.y + 2;
        oBottom = obs.y + obs.height - 2;
      } else {
        const bottomY = GROUND_Y + NORMAL_HEIGHT;
        const h = obs.height + (obs.type === 'ice_double' ? 18 : 0);
        oBottom = bottomY;
        oTop = oBottom - h;
        oLeft = obs.x + 2;
        oRight = obs.x + obs.width - 2;
      }

      return pRight > oLeft && pLeft < oRight && pBottom > oTop && pTop < oBottom;
    }

    // Main game loop
    function update() {
      frameCount++;

      if (gameState === 'playing') {
        // Score
        score += gameSpeed * 0.02;

        // Gradually increase speed
        if (frameCount % 300 === 0) {
          gameSpeed += 0.15;
        }

        // Penguin physics
        if (jumpPressed && !penguin.jumping) {
          penguin.velocityY = JUMP_FORCE;
          penguin.jumping = true;
        }

        penguin.ducking = duckPressed && !penguin.jumping;
        penguin.height = penguin.ducking ? DUCK_HEIGHT : NORMAL_HEIGHT;

        penguin.velocityY += GRAVITY;
        penguin.y += penguin.velocityY;

        if (penguin.y >= GROUND_Y) {
          penguin.y = GROUND_Y;
          penguin.velocityY = 0;
          penguin.jumping = false;
        }

        // Walk animation
        if (!penguin.jumping) {
          penguin.walkTimer++;
          if (penguin.walkTimer >= 3) {
            penguin.walkFrame++;
            penguin.walkTimer = 0;
          }
        }

        // Spawn obstacles
        obstacleTimer++;
        const minGap = Math.max(MIN_OBSTACLE_GAP, 100 - gameSpeed * 3);
        if (obstacleTimer > minGap + Math.random() * 40) {
          spawnObstacle();
          obstacleTimer = 0;
        }

        // Update obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
          obstacles[i].x -= gameSpeed;
          if (obstacles[i].x < -50) {
            obstacles.splice(i, 1);
            continue;
          }
          if (checkCollision(obstacles[i])) {
            gameState = 'dead';
            if (Math.floor(score) > highScore) {
              highScore = Math.floor(score);
              localStorage.setItem('penguinRunnerHigh', String(highScore));
            }
            submitScore('penguin-runner', Math.floor(score));
          }
        }

        // Update mountain offset
        mountainOffset += gameSpeed;
      }

      // Update snowflakes (always animate)
      for (const s of snowflakes) {
        s.y += s.speed;
        s.x -= (gameState === 'playing' ? gameSpeed * 0.2 : 0.3);
        if (s.y > GROUND_Y) { s.y = -5; s.x = Math.random() * BASE_WIDTH; }
        if (s.x < -5) s.x = BASE_WIDTH + 5;
      }

      // Update clouds
      for (const c of clouds) {
        c.x -= (gameState === 'playing' ? gameSpeed * 0.15 + c.speed : c.speed);
        if (c.x < -c.width) c.x = BASE_WIDTH + c.width;
      }

      // Show customize button only on start/dead screens
      document.getElementById('customize-btn').style.display =
        (gameState === 'waiting' || gameState === 'dead') ? 'block' : 'none';
    }

    function draw() {
      ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

      drawSky();
      drawMountains();
      drawClouds();
      drawSnowflakes();
      drawGround();

      // Draw obstacles
      for (const obs of obstacles) {
        drawObstacle(obs);
      }

      drawPenguin();
      drawScore();

      if (gameState === 'waiting') drawStartScreen();
      if (gameState === 'dead') drawGameOver();

      // Copy offscreen canvas to visible canvas
      displayCtx.clearRect(0, 0, canvas.width, canvas.height);
      displayCtx.drawImage(offscreen, 0, 0, canvas.width, canvas.height);
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
