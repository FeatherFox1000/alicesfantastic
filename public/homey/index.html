<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homey</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #f5f0ff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

.top-bar {
  background: linear-gradient(135deg, #7b14c9, #9d4edd);
  color: white; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; flex-wrap: wrap;
}
.top-bar h1 { font-size: 1.2rem; }
.room-tabs { display: flex; gap: 0.3rem; margin-left: auto; }
.room-tab { background: rgba(255,255,255,0.2); border: none; color: white; padding: 0.35rem 0.7rem; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: background 0.2s; }
.room-tab:hover { background: rgba(255,255,255,0.35); }
.room-tab.active { background: white; color: #7b14c9; }
.top-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 0.3rem 0.6rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
.top-btn:hover { background: rgba(255,255,255,0.3); }
.color-label { color: white; font-size: 0.75rem; font-weight: 600; }
.pat-color { width: 26px; height: 24px; border: 2px solid rgba(255,255,255,0.5); border-radius: 4px; cursor: pointer; padding: 0; background: none; }

.main { display: flex; flex: 1; overflow: hidden; }

.palette { width: 180px; background: white; border-right: 2px solid #e0d4f5; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.palette-search { margin: 0.5rem 0.5rem 0; padding: 0.35rem 0.5rem; border: 2px solid #e0d4f5; border-radius: 6px; font-size: 0.8rem; outline: none; }
.palette-search:focus { border-color: #7b14c9; }
.palette-cat { font-size: 0.7rem; font-weight: 700; color: #7b14c9; text-transform: uppercase; letter-spacing: 0.5px; padding: 0.5rem 0.6rem 0.2rem; }
.palette-items { display: flex; flex-wrap: wrap; gap: 0.3rem; padding: 0.3rem 0.5rem; }
.palette-item { width: 52px; height: 58px; background: #f9f5ff; border: 2px solid #e0d4f5; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: grab; transition: all 0.15s; user-select: none; }
.palette-item:hover { border-color: #7b14c9; background: #f0e6ff; }
.palette-item canvas { pointer-events: none; }
.palette-item .label { font-size: 0.5rem; color: #666; margin-top: 1px; font-weight: 600; text-align: center; max-width: 48px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.room-container { flex: 1; position: relative; overflow: hidden; }
.room { width: 100%; height: 100%; position: relative; background: #888; }
.room-ceiling { position: absolute; inset: 0; clip-path: polygon(0 0, 100% 0, 87% 10%, 13% 10%); z-index: 0; }
.room-wall-left { position: absolute; inset: 0; clip-path: polygon(0 0, 13% 10%, 13% 62%, 0 100%); z-index: 0; }
.room-wall-right { position: absolute; inset: 0; clip-path: polygon(87% 10%, 100% 0, 100% 100%, 87% 62%); z-index: 0; }
.room-wall { position: absolute; left: 13%; top: 10%; width: 74%; height: 52%; z-index: 0; }
.room-floor { position: absolute; inset: 0; clip-path: polygon(13% 62%, 87% 62%, 100% 100%, 0 100%); z-index: 0; }
.room-edges { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
.pattern-bar { display: flex; align-items: center; gap: 0.3rem; }
.pat-btn { width: 26px; height: 26px; border: 2px solid rgba(255,255,255,0.3); border-radius: 4px; cursor: pointer; padding: 0; background: #666; overflow: hidden; }
.pat-btn.active { border-color: white; box-shadow: 0 0 4px rgba(255,255,255,0.6); }
.pat-btn canvas { width: 100%; height: 100%; display: block; pointer-events: none; }

.furniture { position: absolute; cursor: grab; user-select: none; z-index: 2; }
.furniture:hover { filter: brightness(1.08); }
.furniture.dragging { opacity: 0.7; z-index: 100; cursor: grabbing; }
.furniture .btn-row { display: none; position: absolute; top: -10px; right: -4px; gap: 2px; z-index: 10; }
.furniture:hover .btn-row { display: flex; }
.furniture .fb { background: #e53e3e; color: white; border: none; width: 18px; height: 18px; border-radius: 50%; font-size: 0.55rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.furniture .fb.color-btn { background: #7b14c9; position: relative; overflow: hidden; }
.furniture .fb.color-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.furniture .resize-handle { display: none; position: absolute; bottom: -3px; right: -3px; width: 14px; height: 14px; cursor: nwse-resize; z-index: 11; }
.furniture .resize-handle::after { content: ''; position: absolute; bottom: 2px; right: 2px; width: 0; height: 0; border-style: solid; border-width: 0 0 10px 10px; border-color: transparent transparent #7b14c9 transparent; opacity: 0.7; }
.furniture:hover .resize-handle { display: block; }

.drag-preview { position: fixed; pointer-events: none; z-index: 10000; opacity: 0.8; transform: translate(-50%, -50%); }
.room.string-mode { cursor: crosshair; }
.string-point { position: absolute; width: 12px; height: 12px; background: #fbbf24; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 50; pointer-events: none; box-shadow: 0 0 8px rgba(251,191,36,0.8); animation: pulse 0.8s infinite; }
@keyframes pulse { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-50%) scale(1.3); } }
.string-hint { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); background: rgba(123,20,201,0.9); color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; z-index: 50; pointer-events: none; white-space: nowrap; }
</style>
</head>
<body>
<div class="top-bar">
  <h1>Homey</h1>
  <button class="top-btn" onclick="undo()">Undo</button>
  <button class="top-btn" onclick="clearRoom()">Clear</button>
  <span class="color-label">Wall</span><input type="color" id="wallColor" class="pat-color" oninput="setWallColor(this.value)">
  <div class="pattern-bar" id="wallPatterns"></div>
  <span class="color-label">Floor</span><input type="color" id="floorColor" class="pat-color" oninput="setFloorColor(this.value)">
  <div class="pattern-bar" id="floorPatterns"></div>
  <div class="room-tabs">
    <button class="room-tab active" onclick="switchRoom('bedroom')">Bedroom</button>
    <button class="room-tab" onclick="switchRoom('cafe')">Cafe</button>
    <button class="room-tab" onclick="switchRoom('gaming')">Gaming</button>
  </div>
</div>
<div class="main">
  <div class="palette" id="palette"></div>
  <div class="room-container"><div class="room" id="room"><div class="room-ceiling" id="roomCeiling"></div><div class="room-wall-left" id="roomWallLeft"></div><div class="room-wall-right" id="roomWallRight"></div><div class="room-wall" id="roomWall"></div><div class="room-floor" id="roomFloor"></div><svg class="room-edges" viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="0" y1="0" x2="13" y2="10" stroke="rgba(0,0,0,0.18)" stroke-width="0.3"/><line x1="100" y1="0" x2="87" y2="10" stroke="rgba(0,0,0,0.18)" stroke-width="0.3"/><line x1="0" y1="100" x2="13" y2="62" stroke="rgba(0,0,0,0.18)" stroke-width="0.3"/><line x1="100" y1="100" x2="87" y2="62" stroke="rgba(0,0,0,0.18)" stroke-width="0.3"/><rect x="13" y="10" width="74" height="52" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="0.2"/></svg></div></div>
</div>
<canvas class="drag-preview" id="dragPreview" style="display:none;" width="80" height="80"></canvas>

<script>
// ── Canvas Drawing Helpers ──
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();}
function darken(c,a){const d=document.createElement('canvas');const x=d.getContext('2d');x.fillStyle=c;x.fillRect(0,0,1,1);const p=x.getImageData(0,0,1,1).data;return`rgba(${Math.max(0,p[0]-a)},${Math.max(0,p[1]-a)},${Math.max(0,p[2]-a)},1)`;}
function lighten(c,a){const d=document.createElement('canvas');const x=d.getContext('2d');x.fillStyle=c;x.fillRect(0,0,1,1);const p=x.getImageData(0,0,1,1).data;return`rgba(${Math.min(255,p[0]+a)},${Math.min(255,p[1]+a)},${Math.min(255,p[2]+a)},1)`;}

// ── Draw Functions ── each takes (ctx, w, h, color)
const DRAWS = {
  // BEDROOM
  bed(ctx,w,h,c){
      ctx.fillStyle='#0002';ctx.beginPath();ctx.ellipse(w*0.5,h*0.97,w*0.48,h*0.04,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=darken(c,30);rr(ctx,w*0.02,h*0.05,w*0.96,h*0.45,5);
      ctx.strokeStyle=darken(c,45);ctx.lineWidth=1;
      for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(w*(0.1+i*0.18),h*0.1);ctx.bezierCurveTo(w*(0.12+i*0.18),h*0.25,w*(0.08+i*0.18),h*0.35,w*(0.11+i*0.18),h*0.48);ctx.stroke();}
      ctx.fillStyle=lighten(c,15);rr(ctx,w*0.04,h*0.42,w*0.92,h*0.38,4);
      ctx.fillStyle=c;rr(ctx,w*0.04,h*0.48,w*0.92,h*0.35,4);
      ctx.fillStyle=darken(c,10);ctx.beginPath();ctx.moveTo(w*0.04,h*0.52);ctx.bezierCurveTo(w*0.3,h*0.48,w*0.7,h*0.49,w*0.96,h*0.52);ctx.lineTo(w*0.96,h*0.56);ctx.bezierCurveTo(w*0.7,h*0.53,w*0.3,h*0.52,w*0.04,h*0.56);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(w*0.35,h*0.46,w*0.2,h*0.07,-.05,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(w*0.68,h*0.46,w*0.2,h*0.07,.05,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#ddd';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(w*0.28,h*0.44);ctx.quadraticCurveTo(w*0.35,h*0.47,w*0.42,h*0.44);ctx.stroke();
      ctx.fillStyle=darken(c,40);rr(ctx,w*0.05,h*0.82,w*0.08,h*0.16,2);rr(ctx,w*0.87,h*0.82,w*0.08,h*0.16,2);
  },
  bunkbed(ctx,w,h,c){
      ctx.fillStyle='#0002';ctx.beginPath();ctx.ellipse(w*0.5,h*0.98,w*0.45,h*0.03,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=darken(c,35);rr(ctx,w*0.03,h*0.02,w*0.08,h*0.94,2);rr(ctx,w*0.89,h*0.02,w*0.08,h*0.94,2);
      ctx.fillStyle=darken(c,20);rr(ctx,w*0.1,h*0.18,w*0.8,h*0.06,2);
      ctx.fillStyle=lighten(c,20);rr(ctx,w*0.12,h*0.08,w*0.76,h*0.12,3);
      ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(w*0.25,h*0.12,w*0.1,h*0.045,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=darken(c,30);ctx.lineWidth=w*0.02;ctx.beginPath();ctx.moveTo(w*0.11,h*0.04);ctx.lineTo(w*0.89,h*0.04);ctx.stroke();
      ctx.fillStyle=darken(c,20);rr(ctx,w*0.1,h*0.58,w*0.8,h*0.06,2);
      ctx.fillStyle=lighten(c,20);rr(ctx,w*0.12,h*0.48,w*0.76,h*0.12,3);
      ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(w*0.25,h*0.52,w*0.1,h*0.045,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=darken(c,40);for(let i=0;i<4;i++)rr(ctx,w*0.89,h*(0.28+i*0.1),w*0.1,h*0.03,1);
      ctx.fillStyle=darken(c,45);rr(ctx,w*0.03,h*0.93,w*0.1,h*0.05,2);rr(ctx,w*0.87,h*0.93,w*0.1,h*0.05,2);
  },
  couch(ctx,w,h,c){
      ctx.fillStyle='#0002';ctx.beginPath();ctx.ellipse(w*0.5,h*0.97,w*0.46,h*0.04,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=darken(c,45);rr(ctx,w*0.08,h*0.88,w*0.06,h*0.1,2);rr(ctx,w*0.86,h*0.88,w*0.06,h*0.1,2);
      ctx.fillStyle=darken(c,15);rr(ctx,w*0.05,h*0.1,w*0.9,h*0.45,6);
      ctx.fillStyle=darken(c,8);ctx.beginPath();ctx.moveTo(w*0.02,h*0.2);ctx.quadraticCurveTo(w*-0.02,h*0.5,w*0.02,h*0.82);ctx.lineTo(w*0.15,h*0.82);ctx.lineTo(w*0.15,h*0.3);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(w*0.98,h*0.2);ctx.quadraticCurveTo(w*1.02,h*0.5,w*0.98,h*0.82);ctx.lineTo(w*0.85,h*0.82);ctx.lineTo(w*0.85,h*0.3);ctx.closePath();ctx.fill();
      ctx.fillStyle=c;rr(ctx,w*0.12,h*0.52,w*0.24,h*0.28,5);rr(ctx,w*0.38,h*0.52,w*0.24,h*0.28,5);rr(ctx,w*0.64,h*0.52,w*0.22,h*0.28,5);
      ctx.strokeStyle=darken(c,20);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(w*0.36,h*0.55);ctx.lineTo(w*0.36,h*0.78);ctx.stroke();
      ctx.beginPath();ctx.moveTo(w*0.62,h*0.55);ctx.lineTo(w*0.62,h*0.78);ctx.stroke();
      ctx.fillStyle=darken(c,25);for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(w*(0.24+i*0.26),h*0.34,w*0.015,0,Math.PI*2);ctx.fill();}
      ctx.fillStyle='#fff1';rr(ctx,w*0.15,h*0.53,w*0.7,h*0.05,3);
  },
  armchair(ctx,w,h,c){
      ctx.fillStyle='#0002';ctx.beginPath();ctx.ellipse(w*0.5,h*0.97,w*0.42,h*0.04,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=darken(c,45);rr(ctx,w*0.12,h*0.88,w*0.06,h*0.1,2);rr(ctx,w*0.82,h*0.88,w*0.06,h*0.1,2);
      ctx.fillStyle=darken(c,12);ctx.beginPath();ctx.moveTo(w*0.15,h*0.5);ctx.quadraticCurveTo(w*0.5,h*0.02,w*0.85,h*0.5);ctx.lineTo(w*0.85,h*0.55);ctx.lineTo(w*0.15,h*0.55);ctx.closePath();ctx.fill();
      ctx.fillStyle=darken(c,5);ctx.beginPath();ctx.moveTo(w*0.02,h*0.3);ctx.bezierCurveTo(w*-0.04,h*0.45,w*0.0,h*0.7,w*0.05,h*0.85);ctx.lineTo(w*0.2,h*0.85);ctx.lineTo(w*0.2,h*0.4);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(w*0.98,h*0.3);ctx.bezierCurveTo(w*1.04,h*0.45,w*1.0,h*0.7,w*0.95,h*0.85);ctx.lineTo(w*0.8,h*0.85);ctx.lineTo(w*0.8,h*0.4);ctx.closePath();ctx.fill();
      ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(w*0.5,h*0.68,w*0.32,h*0.16,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=darken(c,25);ctx.beginPath();ctx.arc(w*0.5,h*0.32,w*0.02,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff1';ctx.beginPath();ctx.ellipse(w*0.5,h*0.62,w*0.2,h*0.05,0,0,Math.PI*2);ctx.fill();
  },
  beanbag(ctx,w,h,c){
      ctx.fillStyle='#0002';ctx.beginPath();ctx.ellipse(w*0.5,h*0.96,w*0.4,h*0.05,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(w*0.15,h*0.85);ctx.bezierCurveTo(w*-0.05,h*0.6,w*0.05,h*0.2,w*0.35,h*0.1);ctx.bezierCurveTo(w*0.55,h*0.03,w*0.75,h*0.08,w*0.85,h*0.25);ctx.bezierCurveTo(w*1.0,h*0.5,w*0.95,h*0.75,w*0.8,h*0.88);ctx.quadraticCurveTo(w*0.5,h*1.0,w*0.15,h*0.85);ctx.fill();
      ctx.fillStyle=darken(c,15);ctx.beginPath();ctx.moveTo(w*0.15,h*0.85);ctx.bezierCurveTo(w*-0.05,h*0.6,w*0.05,h*0.35,w*0.25,h*0.2);ctx.quadraticCurveTo(w*0.15,h*0.55,w*0.25,h*0.88);ctx.closePath();ctx.fill();
      ctx.strokeStyle=darken(c,20);ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(w*0.3,h*0.35);ctx.bezierCurveTo(w*0.35,h*0.5,w*0.3,h*0.65,w*0.35,h*0.8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(w*0.55,h*0.2);ctx.bezierCurveTo(w*0.6,h*0.4,w*0.55,h*0.6,w*0.6,h*0.82);ctx.stroke();
      ctx.strokeStyle=darken(c,30);ctx.lineWidth=1;ctx.setLineDash([w*0.02,w*0.02]);
      ctx.beginPath();ctx.moveTo(w*0.2,h*0.5);ctx.bezierCurveTo(w*0.4,h*0.15,w*0.7,h*0.15,w*0.85,h*0.45);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#fff1';ctx.beginPath();ctx.ellipse(w*0.55,h*0.3,w*0.15,h*0.1,-0.3,0,Math.PI*2);ctx.fill();
  },
  stool(ctx,w,h,c){
      ctx.fillStyle='#0002';ctx.beginPath();ctx.ellipse(w*0.5,h*0.97,w*0.35,h*0.04,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=darken(c,25);
      ctx.beginPath();ctx.moveTo(w*0.2,h*0.35);ctx.lineTo(w*0.1,h*0.95);ctx.lineTo(w*0.18,h*0.95);ctx.lineTo(w*0.26,h*0.35);ctx.fill();
      ctx.beginPath();ctx.moveTo(w*0.74,h*0.35);ctx.lineTo(w*0.82,h*0.95);ctx.lineTo(w*0.9,h*0.95);ctx.lineTo(w*0.8,h*0.35);ctx.fill();
      ctx.fillStyle=darken(c,30);rr(ctx,w*0.15,h*0.65,w*0.7,h*0.04,1);
      ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(w*0.5,h*0.3,w*0.38,h*0.1,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=darken(c,15);ctx.beginPath();ctx.ellipse(w*0.5,h*0.33,w*0.38,h*0.1,0,Math.PI,0);ctx.fill();
      ctx.fillStyle='#fff2';ctx.beginPath();ctx.ellipse(w*0.45,h*0.27,w*0.15,h*0.04,-0.2,0,Math.PI*2);ctx.fill();
  },
  bench(ctx,w,h,c){
      ctx.fillStyle='#0002';ctx.beginPath();ctx.ellipse(w*0.5,h*0.97,w*0.48,h*0.04,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=darken(c,30);rr(ctx,w*0.06,h*0.55,w*0.08,h*0.42,2);rr(ctx,w*0.86,h*0.55,w*0.08,h*0.42,2);
      ctx.fillStyle=darken(c,35);rr(ctx,w*0.1,h*0.75,w*0.8,h*0.04,1);
      ctx.fillStyle=c;rr(ctx,w*0.02,h*0.4,w*0.96,h*0.08,2);
      ctx.fillStyle=darken(c,5);rr(ctx,w*0.02,h*0.48,w*0.96,h*0.08,2);
      ctx.strokeStyle=darken(c,25);ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(w*0.02,h*0.48);ctx.lineTo(w*0.98,h*0.48);ctx.stroke();
      ctx.strokeStyle=darken(c,12);ctx.lineWidth=0.4;
      for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(w*(0.1+i*0.25),h*0.42);ctx.bezierCurveTo(w*(0.12+i*0.25),h*0.45,w*(0.08+i*0.25),h*0.5,w*(0.11+i*0.25),h*0.54);ctx.stroke();}
      ctx.fillStyle='#fff1';rr(ctx,w*0.05,h*0.4,w*0.9,h*0.03,1);
  },
  dresser(ctx,w,h,c){
      ctx.fillStyle='#0002';ctx.beginPath();ctx.ellipse(w*0.5,h*0.98,w*0.44,h*0.03,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=darken(c,40);rr(ctx,w*0.06,h*0.9,w*0.06,h*0.09,1);rr(ctx,w*0.88,h*0.9,w*0.06,h*0.09,1);
      ctx.fillStyle=c;rr(ctx,w*0.05,h*0.06,w*0.9,h*0.86,4);
      ctx.fillStyle=darken(c,12);rr(ctx,w*0.05,h*0.06,w*0.08,h*0.86,4);
      ctx.fillStyle=lighten(c,10);rr(ctx,w*0.05,h*0.06,w*0.9,h*0.06,4);

function drawItem(canvas, drawId, w, h, color, extra) {
  canvas.width = w * 2; canvas.height = h * 2;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  if (DRAWS[drawId]) DRAWS[drawId](ctx, w, h, color, extra);
}

const wallEl = document.getElementById('roomWall');
const floorEl = document.getElementById('roomFloor');
const ceilingEl = document.getElementById('roomCeiling');
const wallLeftEl = document.getElementById('roomWallLeft');
const wallRightEl = document.getElementById('roomWallRight');

function drawPatternBg(el, patterns, patId, color) {
  const pat = patterns[patId] || patterns.plain;
  const c = document.createElement('canvas'); c.width=64; c.height=64;
  const ctx = c.getContext('2d');
  pat.draw(ctx, 64, 64, color);
  el.style.background = `url(${c.toDataURL()})`;
  el.style.backgroundSize = '64px 64px';
}

function applyRoomBg() {
  const c = roomColors[currentRoom];
  drawPatternBg(wallEl, WALL_PATTERNS, c.wallPat, c.wall);
  drawPatternBg(floorEl, FLOOR_PATTERNS, c.floorPat, c.floor);
  // Side walls - same pattern, slightly darker for depth
  drawPatternBg(wallLeftEl, WALL_PATTERNS, c.wallPat, darken(c.wall, 18));
  drawPatternBg(wallRightEl, WALL_PATTERNS, c.wallPat, darken(c.wall, 12));
  // Ceiling - lighter version of wall color
  ceilingEl.style.background = lighten(c.wall, 35);
  document.getElementById('wallColor').value = c.wall;
  document.getElementById('floorColor').value = c.floor;
  renderPatternBtns();
}
function setWallColor(v) { roomColors[currentRoom].wall = v; applyRoomBg(); save(); }
function setFloorColor(v) { roomColors[currentRoom].floor = v; applyRoomBg(); save(); }
function setWallPat(id) { roomColors[currentRoom].wallPat = id; applyRoomBg(); save(); }
function setFloorPat(id) { roomColors[currentRoom].floorPat = id; applyRoomBg(); save(); }

function renderPatternBtns() {
  const c = roomColors[currentRoom];
  let wh = '';
  for (const [id, pat] of Object.entries(WALL_PATTERNS)) {
    wh += `<button class="pat-btn ${c.wallPat===id?'active':''}" onclick="setWallPat('${id}')" title="${pat.label}"><canvas id="wp_${id}" width="26" height="26"></canvas></button>`;
  }
  document.getElementById('wallPatterns').innerHTML = wh;
  for (const [id, pat] of Object.entries(WALL_PATTERNS)) {
    const cv = document.getElementById('wp_'+id); if(cv){const ctx=cv.getContext('2d'); pat.draw(ctx,26,26,c.wall);}
  }
  let fh = '';
  for (const [id, pat] of Object.entries(FLOOR_PATTERNS)) {
    fh += `<button class="pat-btn ${c.floorPat===id?'active':''}" onclick="setFloorPat('${id}')" title="${pat.label}"><canvas id="fp_${id}" width="26" height="26"></canvas></button>`;
  }
  document.getElementById('floorPatterns').innerHTML = fh;
  for (const [id, pat] of Object.entries(FLOOR_PATTERNS)) {
    const cv = document.getElementById('fp_'+id); if(cv){const ctx=cv.getContext('2d'); pat.draw(ctx,26,26,c.floor);}
  }
}

function switchRoom(name) {
  currentRoom = name;
  roomEl.className = 'room';
  document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.room-tab[onclick*="${name}"]`).classList.add('active');
  applyRoomBg(); renderPalette(); renderRoom();
}

function getAllItems() {
  const all = {};
  const seen = new Set();
  for (const [room, cats] of Object.entries(FURNITURE)) {
    for (const [catName, items] of Object.entries(cats)) {
      for (const f of items) {
        if (seen.has(f.id)) continue;
        seen.add(f.id);
        if (!all[catName]) all[catName] = [];
        all[catName].push(f);
      }
    }
  }
  return all;
}

function renderPalette(filter = '') {
  const allItems = getAllItems();
  let html = `<input class="palette-search" type="text" placeholder="Search..." oninput="renderPalette(this.value)" value="${filter}">`;
  const lf = filter.toLowerCase();
  for (const [catName, items] of Object.entries(allItems)) {
    const filtered = lf ? items.filter(f => f.label.toLowerCase().includes(lf)) : items;
    if (!filtered.length) continue;
    html += `<div class="palette-cat">${catName}</div><div class="palette-items">`;
    for (const f of filtered) {
      html += `<div class="palette-item" data-id="${f.id}" onmousedown="startDragNew(event,'${f.id}')" ontouchstart="startDragNew(event,'${f.id}')">
        <canvas id="pal_${f.id}" width="1" height="1"></canvas><span class="label">${f.label}</span></div>`;
    }
    html += `</div>`;
  }
  paletteEl.innerHTML = html;
  // Draw palette previews
  for (const items of Object.values(allItems)) {
    for (const f of items) {
      const c = document.getElementById('pal_' + f.id);
      if (c) drawItem(c, f.draw, 36, 36, f.color);
    }
  }
}

function renderRoom() {
  roomEl.querySelectorAll('.furniture').forEach(el => el.remove());
  placed[currentRoom].forEach(p => roomEl.appendChild(createFurnitureEl(p)));
}

function createFurnitureEl(p) {
  const el = document.createElement('div');
  el.className = 'furniture'; el.dataset.uid = p.uid;
  el.style.left = p.x+'px'; el.style.top = p.y+'px'; el.style.width = p.w+'px'; el.style.height = p.h+'px';
  const c = document.createElement('canvas');
  const extra = p.isString ? {rx1:p.rx1,ry1:p.ry1,rx2:p.rx2,ry2:p.ry2} : null;
  drawItem(c, p.draw, p.w, p.h, p.color, extra);
  el.appendChild(c);
  const btnRow = document.createElement('div'); btnRow.className = 'btn-row';
  btnRow.innerHTML = `<button class="fb color-btn" title="Color" onmousedown="event.stopPropagation()">🎨<input type="color" value="${p.color}" onmousedown="event.stopPropagation()"></button><button class="fb" onmousedown="event.stopPropagation()" onclick="removeFurniture(${p.uid})">✕</button>`;
  const colorInput = btnRow.querySelector('input[type="color"]');
  colorInput.addEventListener('input', e => { e.stopPropagation(); const np = placed[currentRoom].find(i=>i.uid===p.uid); if(np){np.color=e.target.value; const ex=np.isString?{rx1:np.rx1,ry1:np.ry1,rx2:np.rx2,ry2:np.ry2}:null; drawItem(c,np.draw,np.w,np.h,np.color,ex);} });
  colorInput.addEventListener('change', e => { e.stopPropagation(); save(); });
  el.appendChild(btnRow);
  if(!p.isString) {
    const rh = document.createElement('div'); rh.className = 'resize-handle';
    rh.addEventListener('mousedown', e => startResize(e, p.uid));
    rh.addEventListener('touchstart', e => startResize(e, p.uid), {passive:false});
    el.appendChild(rh);
  }
  el.addEventListener('mousedown', e => startDragExisting(e, p.uid));
  el.addEventListener('touchstart', e => startDragExisting(e, p.uid), {passive:false});
  return el;
}

function getDef(id) {
  for (const room of Object.values(FURNITURE)) for (const items of Object.values(room)) { const f = items.find(i => i.id === id); if (f) return f; }
  return null;
}

function changeColor(uid, color) { saveHist(); const p = placed[currentRoom].find(i=>i.uid===uid); if(p){p.color=color; const el=roomEl.querySelector(`[data-uid="${uid}"]`); if(el){const c=el.querySelector('canvas');if(c)drawItem(c,p.draw,p.w,p.h,p.color);} save();} }

function startDragNew(e, id) {
  e.preventDefault(); const f = getDef(id); if (!f) return;
  // Fairy lights use string mode (click two points)
  if(f.draw === 'fairy') {
    if(stringMode) exitStringMode();
    enterStringMode(f.id, 'fairystring', f.color);
    return;
  }
  dragItem = { type:'new', ...f, uid:++idCounter };
  const pos = getPos(e);
  drawItem(prevEl, f.draw, 60, 60, f.color);
  prevEl.style.display = 'block'; prevEl.style.left = pos.x+'px'; prevEl.style.top = pos.y+'px';
}

function startDragExisting(e, uid) {
  e.preventDefault(); const p = placed[currentRoom].find(i=>i.uid===uid); if(!p) return;
  const pos = getPos(e), rect = roomEl.getBoundingClientRect();
  dragOffset.x = pos.x-rect.left-p.x; dragOffset.y = pos.y-rect.top-p.y;
  dragItem = {type:'existing',uid};
  const el = roomEl.querySelector(`[data-uid="${uid}"]`);
  if(el){el.classList.add('dragging');draggingEl=el;}
}

let resizing = null; // {uid, startX, startY, startW, startH}
function startResize(e, uid) {
  e.preventDefault(); e.stopPropagation();
  const p = placed[currentRoom].find(i=>i.uid===uid); if(!p) return;
  saveHist();
  const pos = getPos(e);
  resizing = { uid, startX: pos.x, startY: pos.y, startW: p.w, startH: p.h };
}

function getPos(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}
document.addEventListener('mousemove',onMove);document.addEventListener('touchmove',onMove,{passive:false});
function onMove(e){
  if(resizing){e.preventDefault();const pos=getPos(e);const dx=pos.x-resizing.startX,dy=pos.y-resizing.startY;
    const p=placed[currentRoom].find(i=>i.uid===resizing.uid);if(!p)return;
    p.w=Math.max(20,resizing.startW+dx);p.h=Math.max(20,resizing.startH+dy);
    const el=roomEl.querySelector(`[data-uid="${resizing.uid}"]`);
    if(el){el.style.width=p.w+'px';el.style.height=p.h+'px';const c=el.querySelector('canvas');if(c)drawItem(c,p.draw,p.w,p.h,p.color);}
    return;}
  if(!dragItem)return;e.preventDefault();const pos=getPos(e);
  if(dragItem.type==='new'){prevEl.style.left=pos.x+'px';prevEl.style.top=pos.y+'px';}
  else if(draggingEl){const r=roomEl.getBoundingClientRect();let nx=pos.x-r.left-dragOffset.x,ny=pos.y-r.top-dragOffset.y;nx=Math.max(0,Math.min(r.width-draggingEl.offsetWidth,nx));ny=Math.max(0,Math.min(r.height-draggingEl.offsetHeight,ny));draggingEl.style.left=nx+'px';draggingEl.style.top=ny+'px';}}
document.addEventListener('mouseup',onEnd);document.addEventListener('touchend',onEnd);
function onEnd(e){if(resizing){resizing=null;save();return;}
  if(!dragItem)return;
  if(dragItem.type==='new'){prevEl.style.display='none';const pos=e.changedTouches?{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY}:{x:e.clientX,y:e.clientY};const r=roomEl.getBoundingClientRect();
    if(pos.x>=r.left&&pos.x<=r.right&&pos.y>=r.top&&pos.y<=r.bottom){saveHist();placed[currentRoom].push({uid:dragItem.uid,id:dragItem.id,draw:dragItem.draw,w:dragItem.w,h:dragItem.h,color:dragItem.color,x:Math.max(0,Math.min(r.width-dragItem.w,pos.x-r.left-dragItem.w/2)),y:Math.max(0,Math.min(r.height-dragItem.h,pos.y-r.top-dragItem.h/2))});renderRoom();save();}}
  else if(dragItem.type==='existing'&&draggingEl){saveHist();const p=placed[currentRoom].find(i=>i.uid===dragItem.uid);if(p){p.x=parseFloat(draggingEl.style.left);p.y=parseFloat(draggingEl.style.top);}draggingEl.classList.remove('dragging');draggingEl=null;save();}
  dragItem=null;}

// ── String Mode (fairy lights between two points) ──
let stringMode = null; // null or {id, draw, color, point1: null | {x,y}}
let stringPointEl = null;
let stringHintEl = null;

function enterStringMode(id, draw, color) {
  stringMode = {id, draw, color, point1: null};
  roomEl.classList.add('string-mode');
  // Show hint
  stringHintEl = document.createElement('div');
  stringHintEl.className = 'string-hint';
  stringHintEl.textContent = 'Click first point on wall';
  roomEl.appendChild(stringHintEl);
}
function exitStringMode() {
  stringMode = null;
  roomEl.classList.remove('string-mode');
  if(stringPointEl){stringPointEl.remove();stringPointEl=null;}
  if(stringHintEl){stringHintEl.remove();stringHintEl=null;}
}

roomEl.addEventListener('click', function(e) {
  if(!stringMode) return;
  // Ignore clicks on furniture
  if(e.target.closest('.furniture')) return;
  const rect = roomEl.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if(!stringMode.point1) {
    // Set first point
    stringMode.point1 = {x, y};
    stringPointEl = document.createElement('div');
    stringPointEl.className = 'string-point';
    stringPointEl.style.left = x+'px'; stringPointEl.style.top = y+'px';
    roomEl.appendChild(stringPointEl);
    stringHintEl.textContent = 'Click second point';
  } else {
    // Set second point and create the fairy string
    const p1 = stringMode.point1;
    const p2 = {x, y};
    const pad = 15; // padding for sag
    const minX = Math.min(p1.x, p2.x) - pad;
    const minY = Math.min(p1.y, p2.y) - pad;
    const sag = Math.min(60, Math.abs(p2.x-p1.x)*0.3+15);
    const maxY = Math.max(p1.y, p2.y) + sag + pad;
    const maxX = Math.max(p1.x, p2.x) + pad;
    const w = Math.max(40, maxX - minX);
    const h = Math.max(30, maxY - minY);

    saveHist();
    placed[currentRoom].push({
      uid: ++idCounter,
      id: stringMode.id,
      draw: 'fairystring',
      w: Math.round(w), h: Math.round(h),
      color: stringMode.color,
      x: Math.round(minX), y: Math.round(minY),
      isString: true,
      rx1: Math.round(p1.x - minX), ry1: Math.round(p1.y - minY),
      rx2: Math.round(p2.x - minX), ry2: Math.round(p2.y - minY)
    });
    renderRoom(); save();
    exitStringMode();
  }
});

// Cancel string mode on Escape
document.addEventListener('keydown', e => { if(e.key==='Escape' && stringMode) exitStringMode(); });

function removeFurniture(uid){saveHist();placed[currentRoom]=placed[currentRoom].filter(p=>p.uid!==uid);renderRoom();save();}
function clearRoom(){if(!placed[currentRoom].length)return;saveHist();placed[currentRoom]=[];renderRoom();save();}
function saveHist(){hist[currentRoom].push(JSON.parse(JSON.stringify(placed[currentRoom])));if(hist[currentRoom].length>30)hist[currentRoom].shift();}
function undo(){if(!hist[currentRoom].length)return;placed[currentRoom]=hist[currentRoom].pop();renderRoom();save();}
function save(){try{localStorage.setItem('homey_rooms2',JSON.stringify({placed,roomColors}));}catch{}}
function load(){try{const d=JSON.parse(localStorage.getItem('homey_rooms2'));if(d){if(d.placed){placed={bedroom:d.placed.bedroom||[],cafe:d.placed.cafe||[],gaming:d.placed.gaming||[]};} else {placed={bedroom:d.bedroom||[],cafe:d.cafe||[],gaming:d.gaming||[]};}if(d.roomColors){Object.assign(roomColors,d.roomColors);}let m=0;Object.values(placed).forEach(a=>a.forEach(p=>{if(p.uid>m)m=p.uid;}));idCounter=m;}}catch{}}
load();applyRoomBg();renderPalette();renderRoom();
</script>
