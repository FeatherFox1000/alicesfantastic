<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homey</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #f5f0ff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

.top-bar {
  background: linear-gradient(135deg, #7b14c9, #9d4edd);
  color: white;
  padding: 0.5rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.top-bar h1 { font-size: 1.2rem; }
.room-tabs { display: flex; gap: 0.3rem; margin-left: auto; }
.room-tab {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  padding: 0.35rem 0.7rem;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.8rem;
  transition: background 0.2s;
}
.room-tab:hover { background: rgba(255,255,255,0.35); }
.room-tab.active { background: white; color: #7b14c9; }
.top-btn {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
  padding: 0.3rem 0.6rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
}
.top-btn:hover { background: rgba(255,255,255,0.3); }

.main { display: flex; flex: 1; overflow: hidden; }

.palette {
  width: 180px;
  background: white;
  border-right: 2px solid #e0d4f5;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.palette-search {
  margin: 0.5rem 0.5rem 0;
  padding: 0.35rem 0.5rem;
  border: 2px solid #e0d4f5;
  border-radius: 6px;
  font-size: 0.8rem;
  outline: none;
}
.palette-search:focus { border-color: #7b14c9; }
.palette-cat {
  font-size: 0.7rem;
  font-weight: 700;
  color: #7b14c9;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 0.5rem 0.6rem 0.2rem;
}
.palette-items {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  padding: 0.3rem 0.5rem;
}
.palette-item {
  width: 52px;
  height: 58px;
  background: #f9f5ff;
  border: 2px solid #e0d4f5;
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: grab;
  transition: all 0.15s;
  user-select: none;
}
.palette-item:hover { border-color: #7b14c9; background: #f0e6ff; }
.palette-item .icon { font-size: 1.4rem; line-height: 1; }
.palette-item .label { font-size: 0.5rem; color: #666; margin-top: 1px; font-weight: 600; text-align: center; overflow: hidden; max-width: 48px; white-space: nowrap; text-overflow: ellipsis; }

.room-container { flex: 1; position: relative; overflow: hidden; }
.room { width: 100%; height: 100%; position: relative; transition: background 0.4s; }
.room-bedroom { background: linear-gradient(180deg, #e8d5f5 0%, #d4b8e8 40%, #c4956a 40%, #c4956a 100%); }
.room-cafe { background: linear-gradient(180deg, #ffecd2 0%, #fcb69f 40%, #8b6f5e 40%, #8b6f5e 100%); }
.room-gaming { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 40%, #2d2d44 40%, #2d2d44 100%); }
.room::before { content: ''; position: absolute; left: 0; right: 0; top: 40%; height: 3px; background: rgba(0,0,0,0.15); z-index: 1; }

.furniture {
  position: absolute;
  cursor: grab;
  user-select: none;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
}
.furniture:hover { filter: brightness(1.05); }
.furniture.dragging { opacity: 0.7; z-index: 100; cursor: grabbing; }
.furniture .btn-row {
  display: none;
  position: absolute;
  top: -10px;
  right: -4px;
  gap: 2px;
  z-index: 10;
}
.furniture:hover .btn-row { display: flex; }
.furniture .fb {
  background: #e53e3e;
  color: white;
  border: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 0.55rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.furniture .fb.color-btn { background: #7b14c9; position: relative; }
.furniture .fb.color-btn input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.drag-preview { position: fixed; pointer-events: none; z-index: 10000; opacity: 0.8; font-size: 3rem; transform: translate(-50%, -50%); }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Homey</h1>
  <button class="top-btn" onclick="undo()">Undo</button>
  <button class="top-btn" onclick="clearRoom()">Clear</button>
  <div class="room-tabs">
    <button class="room-tab active" onclick="switchRoom('bedroom')">Bedroom</button>
    <button class="room-tab" onclick="switchRoom('cafe')">Cafe</button>
    <button class="room-tab" onclick="switchRoom('gaming')">Gaming</button>
  </div>
</div>

<div class="main">
  <div class="palette" id="palette"></div>
  <div class="room-container">
    <div class="room room-bedroom" id="room"></div>
  </div>
</div>

Object.values(FURNITURE).forEach(room => Object.values(room).forEach(cat => totalItems += cat.length));

let currentRoom = 'bedroom';
let placed = { bedroom: [], cafe: [], gaming: [] };
let history = { bedroom: [], cafe: [], gaming: [] };
let dragItem = null;
let dragOffset = { x: 0, y: 0 };
let draggingEl = null;
let idCounter = 0;

const room = document.getElementById('room');
const palette = document.getElementById('palette');
const preview = document.getElementById('dragPreview');

function switchRoom(name) {
  currentRoom = name;
  room.className = 'room room-' + name;
  document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.room-tab[onclick*="${name}"]`).classList.add('active');
  renderPalette();
  renderRoom();
}

function renderPalette(filter = '') {
  const cats = FURNITURE[currentRoom];
  let html = `<input class="palette-search" type="text" placeholder="Search..." oninput="renderPalette(this.value)" value="${filter}">`;
  const lf = filter.toLowerCase();
  for (const [catName, items] of Object.entries(cats)) {
    const filtered = lf ? items.filter(f => f.label.toLowerCase().includes(lf) || f.icon.includes(lf)) : items;
    if (filtered.length === 0) continue;
    html += `<div class="palette-cat">${catName}</div><div class="palette-items">`;
    for (const f of filtered) {
      html += `<div class="palette-item" data-id="${f.id}" onmousedown="startDragNew(event,'${f.id}')" ontouchstart="startDragNew(event,'${f.id}')">
        <span class="icon">${f.icon}</span><span class="label">${f.label}</span></div>`;
    }
    html += `</div>`;
  }
  palette.innerHTML = html;
}

function renderRoom() {
  room.innerHTML = '';
  placed[currentRoom].forEach(p => room.appendChild(createFurnitureEl(p)));
}

function createFurnitureEl(p) {
  const el = document.createElement('div');
  el.className = 'furniture';
  el.style.left = p.x + 'px';
  el.style.top = p.y + 'px';
  el.style.width = p.w + 'px';
  el.style.height = p.h + 'px';
  el.style.fontSize = Math.min(p.w, p.h) * 0.7 + 'px';
  if (p.color) el.style.background = p.color + '55';
  el.dataset.uid = p.uid;

  el.innerHTML = `<span>${p.icon}</span>
    <div class="btn-row">
      <button class="fb color-btn" title="Color" onmousedown="event.stopPropagation()">🎨<input type="color" value="${p.color || '#ffffff'}" onchange="changeColor(${p.uid}, this.value)" onmousedown="event.stopPropagation()"></button>
      <button class="fb" onmousedown="event.stopPropagation()" onclick="removeFurniture(${p.uid})">✕</button>
    </div>`;

  el.addEventListener('mousedown', e => startDragExisting(e, p.uid));
  el.addEventListener('touchstart', e => startDragExisting(e, p.uid), { passive: false });
  return el;
}

function getFurnitureDef(id) {
  for (const roomCats of Object.values(FURNITURE)) {
    for (const items of Object.values(roomCats)) {
      const f = items.find(item => item.id === id);
      if (f) return f;
    }
  }
  return null;
}

function changeColor(uid, color) {
  saveHistory();
  const p = placed[currentRoom].find(item => item.uid === uid);
  if (p) {
    p.color = color;
    renderRoom();
    save();
  }
}

function startDragNew(e, id) {
  e.preventDefault();
  const f = getFurnitureDef(id);
  if (!f) return;
  dragItem = { type: 'new', ...f, uid: ++idCounter };
  const pos = getPointerPos(e);
  preview.textContent = f.icon;
  preview.style.display = 'block';
  preview.style.left = pos.x + 'px';
  preview.style.top = pos.y + 'px';
}

function startDragExisting(e, uid) {
  e.preventDefault();
  const p = placed[currentRoom].find(item => item.uid === uid);
  if (!p) return;
  const pos = getPointerPos(e);
  const rect = room.getBoundingClientRect();
  dragOffset.x = pos.x - rect.left - p.x;
  dragOffset.y = pos.y - rect.top - p.y;
  dragItem = { type: 'existing', uid };
  const el = room.querySelector(`[data-uid="${uid}"]`);
  if (el) { el.classList.add('dragging'); draggingEl = el; }
}

function getPointerPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

document.addEventListener('mousemove', onDragMove);
document.addEventListener('touchmove', onDragMove, { passive: false });

function onDragMove(e) {
  if (!dragItem) return;
  e.preventDefault();
  const pos = getPointerPos(e);
  if (dragItem.type === 'new') {
    preview.style.left = pos.x + 'px';
    preview.style.top = pos.y + 'px';
  } else if (draggingEl) {
    const rect = room.getBoundingClientRect();
    let nx = pos.x - rect.left - dragOffset.x;
    let ny = pos.y - rect.top - dragOffset.y;
    nx = Math.max(0, Math.min(rect.width - draggingEl.offsetWidth, nx));
    ny = Math.max(0, Math.min(rect.height - draggingEl.offsetHeight, ny));
    draggingEl.style.left = nx + 'px';
    draggingEl.style.top = ny + 'px';
  }
}

document.addEventListener('mouseup', onDragEnd);
document.addEventListener('touchend', onDragEnd);

function onDragEnd(e) {
  if (!dragItem) return;
  if (dragItem.type === 'new') {
    preview.style.display = 'none';
    const pos = e.changedTouches ? { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY } : { x: e.clientX, y: e.clientY };
    const rect = room.getBoundingClientRect();
    if (pos.x >= rect.left && pos.x <= rect.right && pos.y >= rect.top && pos.y <= rect.bottom) {
      saveHistory();
      placed[currentRoom].push({
        uid: dragItem.uid, id: dragItem.id, icon: dragItem.icon,
        w: dragItem.w, h: dragItem.h,
        x: Math.max(0, Math.min(rect.width - dragItem.w, pos.x - rect.left - dragItem.w / 2)),
        y: Math.max(0, Math.min(rect.height - dragItem.h, pos.y - rect.top - dragItem.h / 2)),
        color: null,
      });
      renderRoom();
      save();
    }
  } else if (dragItem.type === 'existing' && draggingEl) {
    saveHistory();
    const p = placed[currentRoom].find(item => item.uid === dragItem.uid);
    if (p) { p.x = parseFloat(draggingEl.style.left); p.y = parseFloat(draggingEl.style.top); }
    draggingEl.classList.remove('dragging');
    draggingEl = null;
    save();
  }
  dragItem = null;
}

function removeFurniture(uid) { saveHistory(); placed[currentRoom] = placed[currentRoom].filter(p => p.uid !== uid); renderRoom(); save(); }
function clearRoom() { if (!placed[currentRoom].length) return; saveHistory(); placed[currentRoom] = []; renderRoom(); save(); }
function saveHistory() { history[currentRoom].push(JSON.parse(JSON.stringify(placed[currentRoom]))); if (history[currentRoom].length > 30) history[currentRoom].shift(); }
function undo() { if (!history[currentRoom].length) return; placed[currentRoom] = history[currentRoom].pop(); renderRoom(); save(); }
function save() { try { localStorage.setItem('homey_rooms', JSON.stringify(placed)); } catch {} }
function load() {
  try {
    const data = JSON.parse(localStorage.getItem('homey_rooms'));
    if (data) {
      placed = { bedroom: data.bedroom || [], cafe: data.cafe || [], gaming: data.gaming || [] };
      let maxId = 0;
      Object.values(placed).forEach(arr => arr.forEach(p => { if (p.uid > maxId) maxId = p.uid; }));
      idCounter = maxId;
    }
  } catch {}
}

load();
renderPalette();
renderRoom();
</script>
